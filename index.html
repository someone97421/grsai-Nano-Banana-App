        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.3s ease, padding-right 0.3s ease;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .image-slot {
            transition: all 0.3s ease;
            aspect-ratio: 1;
            background: var(--slot-bg);
        }

        .image-slot:hover {
            border-color: var(--accent-blue);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px color-mix(in srgb, var(--accent-blue) 50%, transparent);
        }

        [data-theme="light"] .image-slot:hover {
            box-shadow: 0 10px 25px -5px color-mix(in srgb, var(--accent-blue) 50%, transparent);
        }

        .image-slot.active {
            border-color: var(--accent-green);
            background: rgba(16, 185, 129, 0.1);
        }

        .image-slot.dragover {
            border-color: var(--accent-purple);
            background: rgba(139, 92, 246, 0.2);
        }

        [data-theme="light"] .image-slot.dragover {
            background: rgba(34, 197, 94, 0.2);
        }

        .img-tag {
            position: absolute;
            bottom: 4px;
            left: 4px;
            background: var(--accent-blue);
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            pointer-events: none;
            z-index: 5;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }

        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--accent-blue);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .pastable-indicator {
            position: relative;
        }

        .pastable-indicator::after {
            content: 'Ctrl+V';
            position: absolute;
            bottom: 4px;
            right: 4px;
            font-size: 9px;
            background: rgba(0, 0, 0, 0.6);
            padding: 2px 4px;
            border-radius: 3px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            color: #94a3b8;
        }

        [data-theme="light"] .pastable-indicator::after {
            color: #15803d;
            background: rgba(255, 255, 255, 0.8);
        }

        .pastable-indicator:hover::after {
            opacity: 1;
        }

        input[type="file"] {
            display: none;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(128, 128, 128, 0.1);
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(128, 128, 128, 0.3);
            border-radius: 3px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(128, 128, 128, 0.5);
        }

        /* 富文本编辑器样式 */
        .prompt-editor {
            height: 180px;
            min-height: 120px;
            overflow-y: auto;
            resize: vertical;
            white-space: pre-wrap;
            word-break: break-word;
            background: var(--bg-input);
            border-color: var(--border-input);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .prompt-editor:empty::before {
            content: attr(data-placeholder);
            color: var(--text-muted);
            pointer-events: none;
        }

        .model-tabs {
            display: inline-flex;
            gap: 8px;
            padding: 4px;
            border-radius: 9999px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
        }

        .model-tab {
            border: none;
            border-radius: 9999px;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            background: transparent;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .model-tab:hover {
            color: var(--text-primary);
            background: rgba(148, 163, 184, 0.12);
        }

        .model-tab.active {
            color: white;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            box-shadow: 0 8px 18px -10px color-mix(in srgb, var(--accent-blue) 75%, transparent);
        }

        .hidden-param {
            display: none;
        }

        /* 交互式引用标签 (Chip) */
        .mention-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--chip-bg);
            color: var(--chip-text);
            border: 1px solid var(--chip-border);
            padding: 2px 8px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            user-select: none;
            vertical-align: middle;
            margin: 0 2px;
            transition: all 0.2s;
        }

        .mention-chip:hover {
            filter: brightness(1.2);
        }

        /* 弹出式引用选择面板 */
        .mention-popup {
            position: absolute;
            width: 220px;
            max-height: 280px;
            background: var(--bg-secondary);
            border: 1px solid var(--accent-blue);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 10000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px) scale(0.95);
            transition: all 0.2s ease;
        }

        .mention-popup.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        .mention-popup-header {
            padding: 10px 12px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-input);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .mention-popup-header .hint {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 400;
        }

        .mention-popup-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px;
        }

        .mention-popup-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            margin-bottom: 4px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.15s;
            border: 2px solid transparent;
        }

        .mention-popup-item:hover,
        .mention-popup-item.selected {
            background: var(--chip-bg);
            border-color: var(--accent-blue);
        }

        .mention-popup-item.selected {
            filter: brightness(1.1);
        }

        .mention-popup-item img {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 6px;
            display: block;
            background: var(--slot-bg);
        }

        .mention-popup-item span {
            font-size: 13px;
            color: var(--accent-blue);
            font-family: monospace;
            font-weight: 600;
        }

        .mention-popup-empty {
            padding: 24px 16px;
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .mention-popup-empty .icon {
            font-size: 24px;
            margin-bottom: 8px;
            opacity: 0.5;
        }

        .textarea-wrapper {
            position: relative;
        }

        .clear-btn-inline {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--btn-secondary);
            border: 1px solid var(--border-input);
            color: var(--text-secondary);
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .clear-btn-inline:hover {
            background: #ef4444;
            color: white;
            border-color: #ef4444;
        }

        /* 设置抽屉样式 */
        .settings-drawer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out, opacity 0.3s ease;
            opacity: 0;
        }

        .settings-drawer.open {
            max-height: 800px;
            opacity: 1;
        }

        .drawer-toggle {
            transition: transform 0.3s ease;
        }

        .drawer-toggle.open {
            transform: rotate(180deg);
        }

        /* 历史记录样式 */
        .history-container {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 4px;
            scroll-behavior: smooth;
        }

        .history-item {
            position: relative;
            flex-shrink: 0;
            width: 100px;
            height: 100px;
            overflow: hidden;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .history-item:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .history-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .history-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .history-item:hover .history-overlay {
            opacity: 1;
        }

        .history-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: all 0.2s;
        }

        .history-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .history-time {
            position: absolute;
            bottom: 2px;
            left: 2px;
            right: 2px;
            font-size: 9px;
            color: rgba(255, 255, 255, 0.9);
            background: rgba(0, 0, 0, 0.6);
            padding: 1px 3px;
            border-radius: 3px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 图片预览模态框 */
        .image-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .image-modal.active {
            opacity: 1;
            visibility: visible;
        }

        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .image-modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .image-modal-close:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* 结果图预览限制高度 */
        .result-preview-container {
            max-height: 70vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result-preview-container img {
            max-height: 70vh;
            width: auto;
            object-fit: contain;
        }

        /* 结果图预览放大镜按钮 */
        .result-zoom-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: all 0.2s;
            cursor: pointer;
        }

        .result-zoom-btn:hover {
            filter: brightness(1.1);
            transform: scale(1.1);
        }

        :root {
            --global-task-sidebar-width: 360px;
            --global-task-sidebar-gap: 40px;
        }

        /* 任务列表样式 */
        .task-list-container {
            max-height: 520px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .task-sidebar .task-list-container {
            flex: 1;
            max-height: none;
            min-height: 0;
        }

        .task-item {
            padding: 10px 12px;
            border-radius: 10px;
            background: var(--slot-bg);
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .task-item:hover {
            background: var(--slot-hover);
            border-color: var(--accent-blue);
        }

        .task-item.selected {
            border-color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.15);
        }

        .task-item.pending {
            border-left: 3px solid var(--text-muted);
        }

        .task-item.submitting {
            border-left: 3px solid var(--accent-purple);
        }

        .task-item.polling {
            border-left: 3px solid var(--accent-blue);
        }

        .task-item.completed {
            border-left: 3px solid var(--accent-green);
        }

        .task-item.failed {
            border-left: 3px solid #ef4444;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .task-id {
            font-family: monospace;
            font-size: 11px;
            color: var(--text-muted);
        }

        .task-status {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .task-status.pending {
            background: var(--text-muted);
            color: white;
        }

        .task-status.submitting {
            background: var(--accent-purple);
            color: white;
        }

        .task-status.polling {
            background: var(--accent-blue);
            color: white;
        }

        .task-status.completed {
            background: var(--accent-green);
            color: white;
        }

        .task-status.failed {
            background: #ef4444;
            color: white;
        }

        .task-prompt {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 6px;
        }

        .task-progress-bar {
            height: 4px;
            background: var(--bg-input);
            border-radius: 2px;
            overflow: hidden;
        }

        .task-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .task-progress-text {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 2px;
            text-align: right;
        }

        /* 任务侧边栏 */
        .task-sidebar {
            position: fixed;
            top: 16px;
            right: 16px;
            bottom: 16px;
            width: var(--global-task-sidebar-width);
            min-width: 280px;
            z-index: 90;
            display: flex;
            flex-direction: column;
            transition: width 0.2s ease, min-width 0.2s ease, padding 0.2s ease;
        }

        .task-sidebar.collapsed {
            display: none;
        }

        .task-sidebar-resizer {
            position: absolute;
            top: 12px;
            bottom: 12px;
            left: -8px;
            width: 12px;
            cursor: col-resize;
            z-index: 20;
        }

        .task-sidebar-resizer::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 5px;
            width: 2px;
            height: 48px;
            transform: translateY(-50%);
            border-radius: 9999px;
            background: var(--border-color);
            transition: background 0.2s ease;
        }

        .task-sidebar-resizer:hover::after,
        body.resizing-task-sidebar .task-sidebar-resizer::after {
            background: var(--accent-blue);
        }

        .task-sidebar-toggle {
            width: 30px;
            height: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            transition: all 0.2s ease;
        }

        .task-sidebar-toggle:hover {
            color: var(--text-primary);
            border-color: var(--accent-blue);
        }

        .task-float-btn {
            position: fixed;
            right: 20px;
            bottom: 24px;
            width: 54px;
            height: 54px;
            display: none;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: white;
            box-shadow: 0 14px 30px -12px color-mix(in srgb, var(--accent-blue) 80%, transparent);
            z-index: 95;
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .task-float-btn:hover {
            filter: brightness(1.08);
            transform: translateY(-2px);
        }

        body.task-sidebar-collapsed .task-float-btn {
            display: inline-flex;
        }

        .task-float-count {
            position: absolute;
            top: -6px;
            right: -6px;
            min-width: 20px;
            height: 20px;
            padding: 0 5px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 9999px;
            background: #ef4444;
            color: white;
            font-size: 11px;
            font-weight: 700;
            line-height: 1;
        }

        @media (max-width: 1023px) {
            .task-sidebar {
                top: auto;
                left: 16px;
                right: 16px;
                bottom: 16px;
                width: auto;
                min-width: 0;
                max-height: 55vh;
            }

            .task-sidebar.collapsed {
                display: none;
            }

            .task-sidebar-resizer {
                display: none;
            }
        }

        @media (min-width: 1024px) {
            body:not(.task-sidebar-collapsed) {
                padding-right: calc(var(--global-task-sidebar-width) + var(--global-task-sidebar-gap));
            }
        }

        /* 任务详情展开 */
        .task-summary {
            cursor: pointer;
        }
        .task-summary:hover {
            opacity: 0.9;
        }
        .task-detail {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border-color);
            display: none;
            animation: task-detail-in 0.2s ease;
        }
        .task-item.open .task-detail {
            display: block;
        }
        .task-item.open {
            border-color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.08);
        }
        @keyframes task-detail-in {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .task-detail-section {
            margin-bottom: 10px;
        }
        .task-detail-section-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .task-detail-param {
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.5;
        }
        .task-debug-content {
            font-family: monospace;
            font-size: 10px;
            color: var(--text-muted);
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 300px;
            overflow-y: auto;
            background: var(--bg-input);
            padding: 8px;
            border-radius: 6px;
            line-height: 1.4;
        }
        .task-detail-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .task-chevron {
            width: 16px;
            height: 16px;
            transition: transform 0.2s ease;
            color: var(--text-muted);
            flex-shrink: 0;
        }
        .task-item.open .task-chevron {
            transform: rotate(180deg);
        }

        /* 输入框统一样式 */
        .form-input {
            background: var(--bg-input);
            border: 1px solid var(--border-input);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .form-input:focus {
            border-color: var(--accent-blue);
            outline: none;
            box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent-blue) 30%, transparent);
        }

        [data-theme="light"] .form-input:focus {
            box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent-blue) 30%, transparent);
        }

        /* 下拉框样式 */
        .form-select {
            background-color: var(--bg-input);
            border: 1px solid var(--border-input);
            color: var(--text-primary);
        }

        [data-theme="light"] .form-select option {
            background-color: #f0fdf4;
            color: #166534;
        }

        /* 主题切换按钮 */
        .theme-btn {
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-input);
            background: var(--bg-input);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
        }

        .theme-btn:hover {
            background: var(--btn-secondary-hover);
        }

        .theme-btn.active {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        .color-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .color-btn:hover {
            transform: scale(1.15);
        }

        .color-btn.active {
            border-color: var(--text-primary);
            box-shadow: 0 0 0 2px var(--bg-primary), 0 0 0 4px var(--text-primary);
        }

        /* 单选框样式 */
        input[type="radio"] {
            accent-color: var(--accent-blue);
        }

        /* 开关样式 */
        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--btn-secondary);
            transition: .3s;
            border-radius: 24px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked+.toggle-slider {
            background-color: var(--accent-blue);
        }

        input:checked+.toggle-slider:before {
            transform: translateX(20px);
        }

        /* 裁图工具样式 */
        .crop-tool-drawer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-out, opacity 0.3s ease;
            opacity: 0;
        }

        .crop-tool-drawer.open {
            max-height: 2000px;
            opacity: 1;
        }

        .grid-option-btn {
            padding: 6px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-input);
            background: var(--bg-input);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            font-weight: 500;
        }

        .grid-option-btn:hover {
            background: var(--btn-secondary-hover);
        }

        .grid-option-btn.active {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        .crop-preview-wrapper {
            position: relative;
            display: inline-block;
            max-width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: var(--bg-input);
        }

        .crop-preview-wrapper canvas {
            display: block;
            max-width: 100%;
            height: auto;
            border-radius: 12px;
        }

        .crop-result-grid {
            display: grid;
            gap: 12px;
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 4px;
        }

        .crop-piece {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            background: var(--slot-bg);
            transition: all 0.3s ease;
            cursor: pointer;
            aspect-ratio: auto;
        }

        .crop-piece:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            border-color: var(--accent-blue);
        }

        .crop-piece img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .crop-piece-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .crop-piece:hover .crop-piece-overlay {
            opacity: 1;
        }

        .crop-piece-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }

        .crop-piece-btn:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: scale(1.1);
        }

        .crop-piece-label {
            position: absolute;
            top: 4px;
            left: 4px;
            background: var(--accent-blue);
            color: white;
            font-size: 10px;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 4px;
            font-family: monospace;
            pointer-events: none;
            z-index: 5;
        }

        .crop-history-picker {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9998;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .crop-history-picker.active {
            opacity: 1;
            visibility: visible;
        }

        .crop-history-picker-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            max-width: 600px;
            width: 90%;
            max-height: 70vh;
            overflow-y: auto;
        }

        .crop-history-picker-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .crop-history-picker-item {
            aspect-ratio: 1;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .crop-history-picker-item:hover {
            border-color: var(--accent-blue);
            transform: scale(1.05);
        }

        .crop-history-picker-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>

                                        d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                                </svg>
                                API 配置
                            </h3>
                            <div class="flex gap-2">
                                <button onclick="saveConfig()"
                                    class="px-3 py-1.5 rounded-lg text-sm font-medium transition-colors flex items-center gap-1.5"

                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
                                    </svg>

                                </button>
                                <button onclick="document.getElementById('configFile').click()"

                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                                    </svg>
                                    导入
                                </button>
                                <button onclick="exportConfig()"
                                    class="px-3 py-1.5 rounded-lg text-sm font-medium transition-colors flex items-center gap-1.5"
                                    style="background: var(--btn-secondary); color: var(--text-primary);">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                                    </svg>
                                    导出
                                </button>
                                <button onclick="resetConfig()"
                                    class="px-3 py-1.5 rounded-lg text-sm font-medium transition-colors flex items-center gap-1.5"

                                    </svg>
                                    恢复默认
                                </button>
                                <input type="file" id="configFile" accept=".json" onchange="importConfig(event)">
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div class="space-y-2">
                                <label class="text-sm font-medium" style="color: var(--text-secondary);">接入点</label>
                                <select id="endpointSelector" onchange="onEndpointChange(); saveConfig();" class="w-full px-4 py-2 rounded-lg text-sm form-select">

                                    <option value="https://grsai.dakka.com.cn">国内直连</option>
                                    <option value="https://api.grsai.com">海外节点</option>
                                    <option value="https://grsaiapi.com">海外节点 (备选)</option>
                                    <option value="https://grsai.com">海外节点 (备选2)</option>
                                </select>

                                    URL</label>

                                    class="w-full px-4 py-2 rounded-lg text-sm form-input">
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-medium" style="color: var(--text-secondary);">API Key</label>
                                <input type="password" id="apiKey" onchange="saveConfig()"
                                    class="w-full px-4 py-2 rounded-lg text-sm form-input">
                            </div>
                        </div>
                    </div>

                    <!-- 高级选项 -->
                    <div class="border-t pt-4" style="border-color: var(--border-color);">
                        <h3 class="text-md font-semibold mb-4 flex items-center gap-2"
                            style="color: var(--text-secondary);">
                            <svg class="w-4 h-4" style="color: var(--accent-green);" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M13 10V3L4 14h7v7l9-11h-7z" />
                            </svg>
                            高级选项
                        </h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <!-- 历史记录设置 -->
                            <div>
                                <h4 class="text-sm font-medium mb-3" style="color: var(--text-muted);">历史记录设置</h4>
                                <div class="flex items-center gap-4">
                                    <div class="flex-1">
                                        <label class="text-xs mb-1 block"
                                            style="color: var(--text-muted);">最大保存数量</label>
                                        <input type="number" id="historyLimit" value="20" min="5" max="100" onchange="saveConfig()"
                                            class="w-full px-3 py-2 rounded-lg text-sm form-input">
                                    </div>
                                    <div class="flex-1">
                                        <label class="text-xs mb-1 block"
                                            style="color: var(--text-muted);">任务列表上限</label>

                                            class="w-full px-3 py-2 rounded-lg text-sm form-input">
                                    </div>
                                    <button onclick="clearHistory()"
                                        class="mt-5 px-4 py-2 rounded-lg text-sm transition-colors flex items-center gap-2"
                                        style="background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3);">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                        </svg>
                                        清除历史
                                    </button>
                                </div>
                            </div>

                            <!-- 图片压缩设置 -->
                            <div>
                                <h4 class="text-sm font-medium mb-3" style="color: var(--text-muted);">图片压缩设置</h4>
                                <div class="space-y-3">
                                    <div class="flex items-center justify-between">
                                        <label class="text-sm" style="color: var(--text-secondary);">启用图片压缩</label>
                                        <label class="toggle-switch">
                                            <input type="checkbox" id="enableCompression" onchange="saveConfig()">
                                            <span class="toggle-slider"></span>
                                        </label>
                                    </div>
                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="text-xs mb-1 block" style="color: var(--text-muted);">长边限制
                                                (px)</label>
                                            <input type="number" id="maxEdgeLength" value="2752" min="512" max="8192" onchange="saveConfig()"
                                                class="w-full px-3 py-2 rounded-lg text-sm form-input">
                                        </div>
                                        <div>
                                            <label class="text-xs mb-1 block" style="color: var(--text-muted);">JPEG 质量
                                                (0-1)</label>
                                            <input type="number" id="jpegQuality" value="1" min="0.1" max="1"
                                                step="0.1" onchange="saveConfig()" class="w-full px-3 py-2 rounded-lg text-sm form-input">
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- 并发队列设置 -->
                            <div>
                                <h4 class="text-sm font-medium mb-3" style="color: var(--text-muted);">并发队列设置</h4>
                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <label class="text-xs mb-1 block" style="color: var(--text-muted);">最大并发数</label>
                                        <input type="number" id="maxConcurrency" value="3" min="1" max="10" onchange="saveConfig()"
                                            class="w-full px-3 py-2 rounded-lg text-sm form-input">
                                    </div>
                                    <div>
                                        <label class="text-xs mb-1 block" style="color: var(--text-muted);">轮询间隔 (秒)</label>
                                        <input type="number" id="pollInterval" value="8" min="2" max="30"
                                            step="1" onchange="saveConfig()" class="w-full px-3 py-2 rounded-lg text-sm form-input">
                                    </div>
                                </div>
                                <p class="text-xs mt-2" style="color: var(--text-muted);">设置同时处理的最大任务数和轮询间隔</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 第二排：参考图输入区 + 提示词输入区 -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <!-- 左侧：参考图输入区 -->
            <div class="glass-panel rounded-2xl p-5 lg:col-span-1">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-semibold flex items-center gap-2">
                        <svg class="w-5 h-5" style="color: var(--accent-blue);" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        参考图片
                    </h2>
                    <div class="flex items-center gap-3">
                        <span class="text-xs px-2 py-1 rounded"
                            style="background: var(--bg-input); color: var(--text-muted);" id="imageCount">0 / 14</span>
                        <button onclick="clearAllImages()" class="text-xs transition-colors"
                            style="color: #ef4444;">清空</button>
                    </div>
                </div>
                <div class="grid grid-cols-4 gap-2" id="imageGrid">
                    <!-- Slots generated by JS -->
                </div>
                <p class="text-xs mt-3 text-center" style="color: var(--text-muted);">提示：鼠标悬停后按 Ctrl+V 粘贴图片，或拖拽图片到此处</p>
            </div>

            <div class="glass-panel rounded-2xl p-5 lg:col-span-2">
                <div class="flex flex-col gap-4 mb-4">
                    <div class="flex items-center justify-between gap-3 flex-wrap">
                        <h2 class="text-lg font-semibold flex items-center gap-2">
                            <svg class="w-5 h-5" style="color: var(--accent-purple);" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                            </svg>
                            提示词与参数
                        </h2>
                        <div class="model-tabs" role="tablist" aria-label="模型切换">
                            <button type="button" id="tab-nano-banana" class="model-tab active" role="tab"

                            <button type="button" id="tab-gpt-image-2" class="model-tab" role="tab"
                                aria-selected="false" onclick="setActiveProvider('gpt-image-2')">GPT Image 2</button>
                        </div>
                    </div>
                </div>

                <div class="flex items-center justify-between gap-3 mb-2">
                    <span class="text-xs font-medium" style="color: var(--text-muted);">提示词</span>

                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                        <span class="text-xs">清空</span>
                    </button>

                <div class="textarea-wrapper">

                    <!-- 弹出式引用选择面板 -->
                    <div id="mentionPopup" class="mention-popup">

                            <span>选择图片引用</span>

                        </div>

                            <!-- 动态填充 -->
                        </div>
                    </div>
                </div>

                <!-- 生图参数：按模型切换 -->
                <div class="grid grid-cols-3 gap-3 mt-4" id="paramGrid">
                    <div class="space-y-1">
                        <label class="text-xs font-medium" style="color: var(--text-muted);" id="aspectRatioLabel">宽高比</label>
                        <select id="aspectRatio" class="w-full px-3 py-2 rounded-lg text-sm outline-none form-select"></select>

                        <select id="resolution" class="w-full px-3 py-2 rounded-lg text-sm outline-none form-select"></select>
                    </div>
                    <!-- Nano Banana 模型版本 -->
                    <div id="nanoBananaParams" class="space-y-1">
                        <label class="text-xs font-medium" style="color: var(--text-muted);">模型版本</label>
                        <select id="nanoBananaModel" onchange="saveConfig()" class="w-full px-3 py-2 rounded-lg text-sm outline-none form-select">
                            <option value="nano-banana-fast">Nano Banana Fast</option>
                            <option value="nano-banana">Nano Banana</option>
                            <option value="nano-banana-pro">Nano Banana Pro</option>
                            <option value="nano-banana-pro-vt">Nano Banana Pro VT</option>
                            <option value="nano-banana-pro-cl">Nano Banana Pro CL</option>
                            <option value="nano-banana-2" selected>Nano Banana 2</option>
                            <option value="nano-banana-2-cl">Nano Banana 2 CL</option>

                        </select>

                        <select id="gptImage2Model" onchange="saveConfig()" class="w-full px-3 py-2 rounded-lg text-sm outline-none form-select">

                            <option value="gpt-image-2-vip">gpt-image-2-vip</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div class="space-y-1">
                            <label class="text-xs" style="color: var(--text-muted);">宽</label>
                            <input type="number" id="customWidth" min="16" max="3840" step="16" value="1024"
                                onchange="roundCustomSize(this); saveConfig()"
                                class="w-full px-3 py-2 rounded-lg text-sm outline-none form-input">
                        </div>

    <script>
        // Global state
        let activeSlot = null;
        const imageFiles = [];
        const MAX_REFERENCE_IMAGES = 14;
        let isMentionPopupOpen = false;
        let editingChip = null;
        let selectedIndex = -1;
        let popupKeyword = '';
        let keyboardSelectedIndex = -1;
        let savedRange = null;
        let isSettingsDrawerOpen = false;
        let currentTheme = 'dark';
        let currentAccentColor = 'blue';
        let activeProvider = 'nano-banana';

        // 页面标题与通知
        const ORIGINAL_TITLE = document.title;
        let currentBaseTitle = ORIGINAL_TITLE;
        let titleFlashInterval = null;

        function triggerSuccessNotification() {
            // Play notification sound
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (AudioContext) {
                    const ctx = new AudioContext();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(880, ctx.currentTime);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.3);
                }
            } catch (e) {
                console.error('Audio notification failed:', e);
            }

            // Flash title if not already flashing
            if (!titleFlashInterval) {
                let isFlash = false;
                titleFlashInterval = setInterval(() => {
                    isFlash = !isFlash;
                    document.title = isFlash ? '🟢 ' + currentBaseTitle : currentBaseTitle;
                }, 800);

                const stopFlashing = () => {
                    if (titleFlashInterval) {
                        clearInterval(titleFlashInterval);
                        titleFlashInterval = null;
                        document.title = currentBaseTitle;
                    }
                    window.removeEventListener('focus', stopFlashing);
                    window.removeEventListener('click', stopFlashing);
                    window.removeEventListener('keydown', stopFlashing);
                };
                window.addEventListener('focus', stopFlashing);
                window.addEventListener('click', stopFlashing);
                window.addEventListener('keydown', stopFlashing);
            }
        }

        const MODEL_PROFILES = {

            };
            config[profile.secondaryParamKey] = profile.secondaryOptions[0]?.value || '';
            if (profile.id === 'nano-banana') {

            if (profile.id === 'gpt-image-2') {

        function buildSelectOptions(selectEl, options, selectedValue = '') {
            if (!selectEl) return;
            selectEl.innerHTML = options.map(option =>
                `<option value="${option.value}">${option.label}</option>`
            ).join('');
            selectEl.value = selectedValue;
            if (selectEl.value !== selectedValue) {
                selectEl.value = options[0]?.value || '';
            }
        }

        function collectProviderSettings() {
            const profile = getActiveProfile();
            const settings = {
                aspectRatio: document.getElementById('aspectRatio').value,
                [profile.secondaryParamKey]: document.getElementById('resolution').value
            };
            if (profile.id === 'nano-banana') {
                settings.modelVariant = document.getElementById('nanoBananaModel').value;
            }
            if (profile.id === 'gpt-image-2') {
                settings.modelVariant = document.getElementById('gptImage2Model').value;
                settings.customWidth = parseInt(document.getElementById('customWidth').value) || 1024;
                settings.customHeight = parseInt(document.getElementById('customHeight').value) || 1024;
                if (settings.aspectRatio === 'custom') {
                    settings.aspectRatio = `${settings.customWidth}x${settings.customHeight}`;
                }
            }
            return settings;
        }

        function applyProviderSettings(providerId, settings = {}) {
            const profile = MODEL_PROFILES[providerId] || MODEL_PROFILES['nano-banana'];

            // GPT Image 2: 如果 aspectRatio 是 宽x高 格式，恢复为 custom
            let aspectRatioValue = settings.aspectRatio || profile.aspectRatioOptions[0]?.value || '';
            let customW = 1024, customH = 1024;
            if (profile.id === 'gpt-image-2' && aspectRatioValue && aspectRatioValue !== 'custom') {
                const match = aspectRatioValue.match(/^(\d+)x(\d+)$/);
                if (match && !profile.aspectRatioOptions.some(o => o.value === aspectRatioValue)) {
                    customW = parseInt(match[1]);
                    customH = parseInt(match[2]);
                    aspectRatioValue = 'custom';
                }
            }

            const normalized = {
                aspectRatio: aspectRatioValue,
                [profile.secondaryParamKey]: settings[profile.secondaryParamKey] || profile.secondaryOptions[0]?.value || ''
            };

            document.getElementById('aspectRatioLabel').textContent = profile.aspectRatioLabel;
            document.getElementById('secondaryParamLabel').textContent = profile.secondaryParamLabel;

            const aspectRatioSelect = document.getElementById('aspectRatio');
            const resolutionSelect = document.getElementById('resolution');
            buildSelectOptions(aspectRatioSelect, profile.aspectRatioOptions, normalized.aspectRatio);
            buildSelectOptions(resolutionSelect, profile.secondaryOptions, normalized[profile.secondaryParamKey]);
            aspectRatioSelect.onchange = () => { onAspectRatioChange(); saveConfig(); };
            resolutionSelect.onchange = saveConfig;
            document.getElementById('secondaryParamGroup').classList.toggle('hidden-param', !profile.showSecondaryParam);

            // Nano Banana 专属参数显隐
            const nanoBananaParams = document.getElementById('nanoBananaParams');
            if (nanoBananaParams) {
                nanoBananaParams.classList.toggle('hidden-param', profile.id !== 'nano-banana');
            }
            if (profile.id === 'nano-banana') {
                const modelVariant = settings.modelVariant || profile.defaultModelVariant;
                const modelSelect = document.getElementById('nanoBananaModel');
                if (modelSelect) modelSelect.value = modelVariant;
            }

            // GPT Image 2 专属参数显隐
            const gptImage2Params = document.getElementById('gptImage2Params');
            if (gptImage2Params) {
                gptImage2Params.classList.toggle('hidden-param', profile.id !== 'gpt-image-2');
            }
            const gptImage2CustomSize = document.getElementById('gptImage2CustomSize');
            if (gptImage2CustomSize) {
                const isCustom = profile.id === 'gpt-image-2' && aspectRatioSelect.value === 'custom';
                gptImage2CustomSize.classList.toggle('hidden-param', !isCustom);
            }
            if (profile.id === 'gpt-image-2') {
                const modelVariant = settings.modelVariant || profile.defaultModelVariant;
                const modelSelect = document.getElementById('gptImage2Model');
                if (modelSelect) modelSelect.value = modelVariant;
                const wInput = document.getElementById('customWidth');
                const hInput = document.getElementById('customHeight');
                if (wInput) wInput.value = settings.customWidth || customW;
                if (hInput) hInput.value = settings.customHeight || customH;
            }

            const promptEditor = document.getElementById('prompt');
            if (promptEditor) {
                promptEditor.dataset.placeholder = profile.promptPlaceholder;
            }

            // 动态调整参数网格列数
            const paramGrid = document.getElementById('paramGrid');
            if (paramGrid) {
                const visibleChildren = Array.from(paramGrid.children).filter(child => !child.classList.contains('hidden-param')).length;
                paramGrid.style.gridTemplateColumns = `repeat(${Math.max(visibleChildren, 1)}, minmax(0, 1fr))`;
            }

            Object.values(MODEL_PROFILES).forEach(item => {
                const button = document.getElementById(item.tabId);
                if (!button) return;
                const isActive = item.id === providerId;
                button.classList.toggle('active', isActive);
                button.setAttribute('aria-selected', isActive ? 'true' : 'false');
            });
        }

        function onAspectRatioChange() {
            const profile = getActiveProfile();

            if (!customSizeEl || profile.id !== 'gpt-image-2') return;

            customSizeEl.classList.toggle('hidden-param', !isCustom);

        function roundCustomSize(input) {
            let val = parseInt(input.value) || 16;
            val = Math.min(val, 3840);
            val = Math.max(val, 16);
            const remainder = val % 16;
            if (remainder !== 0) {
                val = val + (16 - remainder);
            }
            if (val > 3840) val = 3840;
            input.value = val;
        }

        function setActiveProvider(providerId, options = {}) {
            if (!MODEL_PROFILES[providerId]) return;

            const shouldPreserveCurrent = options.preserveCurrent !== false;
            const providerSettings = options.providerSettings || {};

            if (shouldPreserveCurrent && MODEL_PROFILES[activeProvider]) {
                providerSettings[activeProvider] = collectProviderSettings();
            }

            activeProvider = providerId;
            const nextSettings = providerSettings[providerId] || getProviderSettings(providerId);
            applyProviderSettings(providerId, nextSettings);
            if (options.save !== false) {
                saveConfig();
            }
        }

        // ==================== 主题管理 ====================

        // ==================== IndexedDB 操作 ====================
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);

                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };

                request.onupgradeneeded = (event) => {
                    const database = event.target.result;
                    if (!database.objectStoreNames.contains(STORE_NAME)) {
                        const store = database.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                        store.createIndex('timestamp', 'timestamp', { unique: false });
                    }
                    if (!database.objectStoreNames.contains(SESSION_STORE_NAME)) {
                        database.createObjectStore(SESSION_STORE_NAME, { keyPath: 'key' });
                    }
                };
            });
        }

        async function saveReferenceImages() {
            if (!db) return;

            const referenceImages = [];
            for (let index = 0; index < imageFiles.length; index++) {
                const file = imageFiles[index];
                if (!file) continue;

                try {
                    referenceImages.push({
                        index,
                        dataUrl: await blobToBase64(file),
                        name: file.name || `image${index + 1}`,
                        type: file.type || 'image/png',
                        lastModified: file.lastModified || Date.now()
                    });
                } catch (error) {
                    console.error(`Failed to persist reference image at index ${index}:`, error);
                }
            }

            return new Promise((resolve, reject) => {
                const transaction = db.transaction([SESSION_STORE_NAME], 'readwrite');
                const store = transaction.objectStore(SESSION_STORE_NAME);
                const request = store.put({
                    key: REFERENCE_IMAGES_STATE_KEY,
                    images: referenceImages,
                    timestamp: Date.now()
                });
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        function clearSavedReferenceImages() {
            return new Promise((resolve, reject) => {
                if (!db) {
                    resolve();
                    return;
                }

                const transaction = db.transaction([SESSION_STORE_NAME], 'readwrite');
                const store = transaction.objectStore(SESSION_STORE_NAME);
                const request = store.delete(REFERENCE_IMAGES_STATE_KEY);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        function getSavedReferenceImages() {
            return new Promise((resolve, reject) => {
                if (!db) {
                    resolve([]);
                    return;
                }

                const transaction = db.transaction([SESSION_STORE_NAME], 'readonly');
                const store = transaction.objectStore(SESSION_STORE_NAME);
                const request = store.get(REFERENCE_IMAGES_STATE_KEY);
                request.onsuccess = () => resolve(request.result?.images || []);
                request.onerror = () => reject(request.error);
            });
        }

        async function loadSavedReferenceImages() {
            try {
                const referenceImages = await getSavedReferenceImages();
                if (!referenceImages.length) return;

                imageFiles.length = 0;
                for (const refImg of referenceImages) {
                    try {
                        const file = await dataURLToFile(refImg.dataUrl, refImg.name || `image${refImg.index + 1}`);
                        imageFiles[refImg.index] = file;
                    } catch (error) {
                        console.error(`Failed to restore saved reference image at index ${refImg.index}:`, error);
                    }
                }

                renderImageGrid();
            } catch (error) {
                console.error('Failed to restore saved reference images:', error);
            }
        }

        async function saveTaskQueue() {
            if (!db) return;
            try {
                const serializable = [];
                for (const t of taskQueue) {
                    const { pollTimer, images, ...rest } = t;
                    const imagesData = [];
                    if (images && images.length > 0) {
                        for (const img of images) {
                            try {
                                const dataUrl = await blobToBase64(img);
                                imagesData.push({
                                    dataUrl,
                                    name: img.name || 'image',
                                    type: img.type || 'image/png',
                                    lastModified: img.lastModified || Date.now()
                                });
                            } catch (e) {
                                console.error('Failed to serialize task image:', e);
                            }
                        }
                    }
                    serializable.push({ ...rest, imagesData });
                }
                const transaction = db.transaction([SESSION_STORE_NAME], 'readwrite');
                const store = transaction.objectStore(SESSION_STORE_NAME);
                store.put({
                    key: TASK_QUEUE_STATE_KEY,
                    tasks: serializable,
                    taskIdCounter,
                    timestamp: Date.now()
                });
            } catch (error) {
                console.error('Failed to save task queue:', error);
            }
        }

        async function loadTaskQueue() {
            if (!db) return;
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([SESSION_STORE_NAME], 'readonly');
                const store = transaction.objectStore(SESSION_STORE_NAME);
                const request = store.get(TASK_QUEUE_STATE_KEY);
                request.onsuccess = async () => {
                    try {
                        const data = request.result;
                        if (!data || !data.tasks || data.tasks.length === 0) {
                            resolve();
                            return;
                        }
                        taskIdCounter = data.taskIdCounter || 0;
                        taskQueue = [];
                        for (const savedTask of data.tasks) {
                            const { imagesData, ...taskRest } = savedTask;
                            const images = [];
                            if (imagesData && imagesData.length > 0) {
                                for (const imgData of imagesData) {
                                    try {
                                        const file = await dataURLToFile(imgData.dataUrl, imgData.name || 'image');
                                        images.push(file);
                                    } catch (e) {
                                        console.error('Failed to restore task image:', e);
                                    }
                                }
                            }
                            const task = {
                                ...taskRest,
                                pollTimer: null,
                                images
                            };
                            taskQueue.push(task);
                        }
                        updateTaskUI();
                        for (const task of taskQueue) {
                            if (task.status === 'pending' || task.status === 'submitting' || task.status === 'polling') {
                                task.status = 'pending';
                            }
                        }
                        processTaskQueue();
                        resolve();
                    } catch (error) {
                        console.error('Failed to restore task queue:', error);
                        resolve();
                    }
                };
                request.onerror = () => reject(request.error);
            });
        }

        function addHistoryItem(imageData, prompt) {
            return new Promise((resolve, reject) => {
                if (!db) {
                    reject(new Error('Database not initialized'));
                    return;
                }

                // 保存参考图片数据（只保存有图片的槽位）
                const referenceImages = [];
                imageFiles.forEach((file, index) => {
                    if (file) {
                        // 将 File 对象转换为 Base64 以便存储
                        const reader = new FileReader();
                        reader.readAsDataURL(file);
                        reader.onloadend = () => {
                            referenceImages.push({
                                index: index,
                                dataUrl: reader.result,
                                name: file.name || `image${index + 1}`
                            });
                            
                            // 当所有图片都转换完成后添加到历史记录
                            if (referenceImages.length === imageFiles.filter(f => f !== null).length) {
                                saveToHistory(imageData, prompt, referenceImages, resolve, reject);
                            }
                        };
                    }
                });
                
                // 如果没有参考图，直接保存
                if (imageFiles.filter(f => f !== null).length === 0) {
                    saveToHistory(imageData, prompt, [], resolve, reject);
                }
            });
        }

        function saveToHistory(imageData, prompt, referenceImages, resolve, reject) {
            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const store = transaction.objectStore(STORE_NAME);

            const item = {
                imageData: imageData,
                prompt: prompt,
                referenceImages: referenceImages,
                timestamp: Date.now()
            };

            const request = store.add(item);
            request.onsuccess = () => {
                cleanupOldHistory().then(() => resolve(request.result));
            };
            request.onerror = () => reject(request.error);
        }

        function getAllHistory() {
            return new Promise((resolve, reject) => {
                if (!db) {
                    reject(new Error('Database not initialized'));
                    return;
                }

                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const index = store.index('timestamp');
                const request = index.openCursor(null, 'prev');

                const results = [];
                request.onsuccess = (event) => {
                    const cursor = event.target.result;
                    if (cursor) {
                        results.push(cursor.value);
                        cursor.continue();
                    } else {
                        resolve(results);
                    }
                };
                request.onerror = () => reject(request.error);
            });
        }

        function deleteHistoryItem(id) {
            return new Promise((resolve, reject) => {
                if (!db) {
                    reject(new Error('Database not initialized'));
                    return;
                }

                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.delete(id);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        function clearAllHistory() {
            return new Promise((resolve, reject) => {
                if (!db) {
                    reject(new Error('Database not initialized'));
                    return;
                }

                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.clear();
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        async function cleanupOldHistory() {
            const limit = parseInt(document.getElementById('historyLimit').value) || 20;
            const all = await getAllHistory();

            if (all.length > limit) {
                const toDelete = all.slice(limit);
                for (const item of toDelete) {
                    await deleteHistoryItem(item.id);
                }
            }
        }

        async function loadHistory() {
            try {
                const history = await getAllHistory();
                const container = document.getElementById('historyContainer');
                const countEl = document.getElementById('historyCount');

                countEl.textContent = history.length;

                if (history.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-8 text-sm flex-shrink-0 w-full" style="color: var(--text-muted);">
                            暂无历史记录
                        </div>
                    `;
                    return;
                }

                container.innerHTML = history.map(item => `
                    <div class="history-item">
                        <img src="${item.imageData}" alt="Generated" loading="lazy">
                        <div class="history-overlay">
                            <button class="history-btn" onclick="reusePrompt(${item.id})" title="复用提示词">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"/></svg>
                            </button>
                            <button class="history-btn" onclick="openImageModal('${item.imageData}')" title="放大预览">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"/></svg>

                            <button class="history-btn" onclick="downloadHistoryImage(${item.id})" title="下载">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>

                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;

            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}分钟前`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}小时前`;
            if (diff < 604800000) return `${Math.floor(diff / 86400000)}天前`;

            return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
        }

        // 辅助函数：将【imageX】格式的文本转换回 mention chip HTML
        function parsePromptWithMentions(promptText) {
            if (!promptText) return '';
            
            // 使用正则表达式匹配【image数字】格式
            const mentionRegex = /【image(\d+)】/g;
            let result = '';
            let lastIndex = 0;
            let match;
            
            while ((match = mentionRegex.exec(promptText)) !== null) {
                // 添加匹配前的文本
                result += escapeHtml(promptText.slice(lastIndex, match.index));
                
                const imgIndex = parseInt(match[1]) - 1; // 转换为 0-based 索引
                const chipInner = `@img${match[1]} <svg style="width:12px;height:12px;margin-left:2px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>`;
                
                // 创建 chip HTML
                result += `<span class="mention-chip" contenteditable="false" data-index="${imgIndex}" onclick="editExistingMention(event, this)">${chipInner}</span>&nbsp;`;
                
                lastIndex = match.index + match[0].length;
            }
            
            // 添加剩余文本
            result += escapeHtml(promptText.slice(lastIndex));
            
            return result;
        }
