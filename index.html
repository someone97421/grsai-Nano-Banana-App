<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <link rel="icon" href="favicon.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grsai-🍌图像生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 夜间模式（默认） */
            --bg-primary: #0f172a;
            --bg-secondary: rgba(30, 41, 59, 0.7);
            --bg-input: rgba(30, 41, 59, 0.5);
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: rgba(255, 255, 255, 0.1);
            --border-input: #475569;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-green: #10b981;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --slot-bg: rgba(30, 41, 59, 0.3);
            --slot-hover: rgba(30, 41, 59, 0.5);
            --chip-bg: rgba(37, 99, 235, 0.2);
            --chip-border: rgba(59, 130, 246, 0.4);
            --chip-text: #93c5fd;
            --btn-secondary: #334155;
            --btn-secondary-hover: #475569;
        }

        [data-theme="light"] {
            /* 日间模式 - 白绿配色 */
            --bg-primary: #f0fdf4;
            --bg-secondary: rgba(255, 255, 255, 0.9);
            --bg-input: rgba(255, 255, 255, 0.8);
            --text-primary: #1a1a1a;
            --text-secondary: #4b5563;
            --text-muted: #6b7280;
            --border-color: rgba(34, 197, 94, 0.2);
            --border-input: #86efac;
            --accent-blue: #16a34a;
            --accent-purple: #22c55e;
            --accent-green: #15803d;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --slot-bg: rgba(220, 252, 231, 0.5);
            --slot-hover: rgba(187, 247, 208, 0.7);
            --chip-bg: rgba(34, 197, 94, 0.15);
            --chip-border: rgba(34, 197, 94, 0.4);
            --chip-text: #15803d;
            --btn-secondary: #dcfce7;
            --btn-secondary-hover: #bbf7d0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .image-slot {
            transition: all 0.3s ease;
            aspect-ratio: 1;
            background: var(--slot-bg);
        }

        .image-slot:hover {
            border-color: var(--accent-blue);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.3);
        }

        [data-theme="light"] .image-slot:hover {
            box-shadow: 0 10px 25px -5px rgba(22, 163, 74, 0.3);
        }

        .image-slot.active {
            border-color: var(--accent-green);
            background: rgba(16, 185, 129, 0.1);
        }

        .image-slot.dragover {
            border-color: var(--accent-purple);
            background: rgba(139, 92, 246, 0.2);
        }

        [data-theme="light"] .image-slot.dragover {
            background: rgba(34, 197, 94, 0.2);
        }

        .img-tag {
            position: absolute;
            bottom: 4px;
            left: 4px;
            background: var(--accent-blue);
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            pointer-events: none;
            z-index: 5;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }

        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--accent-blue);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .pastable-indicator {
            position: relative;
        }

        .pastable-indicator::after {
            content: 'Ctrl+V';
            position: absolute;
            bottom: 4px;
            right: 4px;
            font-size: 9px;
            background: rgba(0, 0, 0, 0.6);
            padding: 2px 4px;
            border-radius: 3px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            color: #94a3b8;
        }

        [data-theme="light"] .pastable-indicator::after {
            color: #15803d;
            background: rgba(255, 255, 255, 0.8);
        }

        .pastable-indicator:hover::after {
            opacity: 1;
        }

        input[type="file"] {
            display: none;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(128, 128, 128, 0.1);
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(128, 128, 128, 0.3);
            border-radius: 3px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(128, 128, 128, 0.5);
        }

        /* 富文本编辑器样式 */
        .prompt-editor {
            min-height: 120px;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
            background: var(--bg-input);
            border-color: var(--border-input);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .prompt-editor:empty::before {
            content: attr(data-placeholder);
            color: var(--text-muted);
            pointer-events: none;
        }

        /* 交互式引用标签 (Chip) */
        .mention-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--chip-bg);
            color: var(--chip-text);
            border: 1px solid var(--chip-border);
            padding: 2px 8px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            user-select: none;
            vertical-align: middle;
            margin: 0 2px;
            transition: all 0.2s;
        }

        .mention-chip:hover {
            filter: brightness(1.2);
        }

        /* 弹出式引用选择面板 */
        .mention-popup {
            position: absolute;
            width: 220px;
            max-height: 280px;
            background: var(--bg-secondary);
            border: 1px solid var(--accent-blue);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px) scale(0.95);
            transition: all 0.2s ease;
        }

        .mention-popup.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        .mention-popup-header {
            padding: 10px 12px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-input);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .mention-popup-header .hint {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 400;
        }

        .mention-popup-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px;
        }

        .mention-popup-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            margin-bottom: 4px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.15s;
            border: 2px solid transparent;
        }

        .mention-popup-item:hover,
        .mention-popup-item.selected {
            background: var(--chip-bg);
            border-color: var(--accent-blue);
        }

        .mention-popup-item.selected {
            filter: brightness(1.1);
        }

        .mention-popup-item img {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 6px;
            display: block;
            background: var(--slot-bg);
        }

        .mention-popup-item span {
            font-size: 13px;
            color: var(--accent-blue);
            font-family: monospace;
            font-weight: 600;
        }

        .mention-popup-empty {
            padding: 24px 16px;
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .mention-popup-empty .icon {
            font-size: 24px;
            margin-bottom: 8px;
            opacity: 0.5;
        }

        .textarea-wrapper {
            position: relative;
        }

        .mention-btn {
            position: absolute;
            right: 12px;
            top: 8px;
            background: var(--btn-secondary);
            border: 1px solid var(--border-input);
            color: var(--text-secondary);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 10;
            font-weight: 600;
        }

        .mention-btn:hover,
        .mention-btn.active {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        /* 设置抽屉样式 */
        .settings-drawer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out, opacity 0.3s ease;
            opacity: 0;
        }

        .settings-drawer.open {
            max-height: 800px;
            opacity: 1;
        }

        .drawer-toggle {
            transition: transform 0.3s ease;
        }

        .drawer-toggle.open {
            transform: rotate(180deg);
        }

        /* 历史记录样式 */
        .history-container {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 4px;
            scroll-behavior: smooth;
        }

        .history-item {
            position: relative;
            flex-shrink: 0;
            width: 100px;
            height: 100px;
            overflow: hidden;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .history-item:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .history-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .history-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .history-item:hover .history-overlay {
            opacity: 1;
        }

        .history-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: all 0.2s;
        }

        .history-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .history-time {
            position: absolute;
            bottom: 2px;
            left: 2px;
            right: 2px;
            font-size: 9px;
            color: rgba(255, 255, 255, 0.9);
            background: rgba(0, 0, 0, 0.6);
            padding: 1px 3px;
            border-radius: 3px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 图片预览模态框 */
        .image-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .image-modal.active {
            opacity: 1;
            visibility: visible;
        }

        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .image-modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .image-modal-close:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* 结果图预览限制高度 */
        .result-preview-container {
            max-height: 70vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result-preview-container img {
            max-height: 70vh;
            width: auto;
            object-fit: contain;
        }

        /* 结果图预览放大镜按钮 */
        .result-zoom-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: all 0.2s;
            cursor: pointer;
        }

        .result-zoom-btn:hover {
            filter: brightness(1.1);
            transform: scale(1.1);
        }

        /* 任务列表样式 */
        .task-list-container {
            max-height: 300px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .task-item {
            padding: 10px 12px;
            border-radius: 10px;
            background: var(--slot-bg);
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .task-item:hover {
            background: var(--slot-hover);
            border-color: var(--accent-blue);
        }

        .task-item.selected {
            border-color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.15);
        }

        .task-item.pending {
            border-left: 3px solid var(--text-muted);
        }

        .task-item.submitting {
            border-left: 3px solid var(--accent-purple);
        }

        .task-item.polling {
            border-left: 3px solid var(--accent-blue);
        }

        .task-item.completed {
            border-left: 3px solid var(--accent-green);
        }

        .task-item.failed {
            border-left: 3px solid #ef4444;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .task-id {
            font-family: monospace;
            font-size: 11px;
            color: var(--text-muted);
        }

        .task-status {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .task-status.pending {
            background: var(--text-muted);
            color: white;
        }

        .task-status.submitting {
            background: var(--accent-purple);
            color: white;
        }

        .task-status.polling {
            background: var(--accent-blue);
            color: white;
        }

        .task-status.completed {
            background: var(--accent-green);
            color: white;
        }

        .task-status.failed {
            background: #ef4444;
            color: white;
        }

        .task-prompt {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 6px;
        }

        .task-progress-bar {
            height: 4px;
            background: var(--bg-input);
            border-radius: 2px;
            overflow: hidden;
        }

        .task-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .task-progress-text {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 2px;
            text-align: right;
        }

        /* 任务调试信息面板 */
        .task-debug-panel {
            margin-top: 16px;
            padding: 12px;
            border-radius: 10px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
        }

        .task-debug-header {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-debug-content {
            font-family: monospace;
            font-size: 11px;
            color: var(--text-muted);
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 200px;
            overflow-y: auto;
        }

        /* 输入框统一样式 */
        .form-input {
            background: var(--bg-input);
            border: 1px solid var(--border-input);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .form-input:focus {
            border-color: var(--accent-blue);
            outline: none;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        [data-theme="light"] .form-input:focus {
            box-shadow: 0 0 0 2px rgba(22, 163, 74, 0.2);
        }

        /* 下拉框样式 */
        .form-select {
            background-color: var(--bg-input);
            border: 1px solid var(--border-input);
            color: var(--text-primary);
        }

        [data-theme="light"] .form-select option {
            background-color: #f0fdf4;
            color: #166534;
        }

        /* 主题切换按钮 */
        .theme-btn {
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-input);
            background: var(--bg-input);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
        }

        .theme-btn:hover {
            background: var(--btn-secondary-hover);
        }

        .theme-btn.active {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        /* 单选框样式 */
        input[type="radio"] {
            accent-color: var(--accent-blue);
        }

        /* 开关样式 */
        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--btn-secondary);
            transition: .3s;
            border-radius: 24px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked+.toggle-slider {
            background-color: var(--accent-blue);
        }

        input:checked+.toggle-slider:before {
            transform: translateX(20px);
        }
    </style>
</head>

<body class="min-h-screen p-4 md:p-6 custom-scrollbar">

    <!-- 图片预览模态框 -->
    <div id="imageModal" class="image-modal" onclick="closeImageModal()">
        <div class="image-modal-close">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </div>
        <img id="modalImage" src="" alt="Preview" onclick="event.stopPropagation()">
    </div>

    <div class="max-w-7xl mx-auto space-y-4">
        <!-- 标题 -->
        <div class="text-center space-y-2 mb-6">
            <h1
                class="text-3xl md:text-4xl font-bold bg-gradient-to-r from-blue-400 via-purple-400 to-pink-400 bg-clip-text text-transparent">
                Grsai-🍌图像生成器
            </h1>
            <p class="text-slate-400 text-sm" style="color: var(--text-secondary);">支持 Nano-banana 系列多图参考生成 |
                输入 @ 引用图像</p>
        </div>

        <!-- 第一排：设置区（可关闭抽屉） -->
        <div class="glass-panel rounded-2xl overflow-hidden">
            <button onclick="toggleSettingsDrawer()"
                class="w-full px-6 py-4 flex items-center justify-between hover:bg-opacity-50 transition-colors"
                style="background: rgba(128,128,128,0.05);">
                <div class="flex items-center gap-3">
                    <svg class="w-5 h-5" style="color: var(--accent-blue);" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    <span class="text-lg font-semibold">设置与配置</span>
                    <span class="text-xs px-2 py-1 rounded"
                        style="background: var(--bg-input); color: var(--text-muted);">API配置、导入导出、主题设置</span>
                </div>
                <svg id="settingsDrawerIcon" class="w-6 h-6 drawer-toggle" style="color: var(--text-secondary);"
                    fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                </svg>
            </button>

            <div id="settingsDrawer" class="settings-drawer">

    <script>
        // Global state
        let activeSlot = null;
        const imageFiles = [];
        let isMentionPopupOpen = false;
        let editingChip = null;
        let selectedIndex = -1;
        let popupKeyword = '';
        let keyboardSelectedIndex = -1;
        let savedRange = null;
        let isSettingsDrawerOpen = false;
        let currentTheme = 'dark';
        
        // 任务队列管理
        let taskQueue = []; // 等待执行的任务
        let activeTasks = new Map(); // 正在执行的任务 (taskId -> taskInfo)
        let runningTaskCount = 0; // 当前正在运行的任务数
        let taskIdCounter = 0; // 本地任务ID计数器

        // IndexedDB 相关
        const DB_NAME = 'GrsaiNanoBananaDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'history';
        let db = null;

        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            initImageGrid();
            loadSavedConfig();
            setupPasteListener();
            setupMentionSystem();
            initDB().then(() => {
                loadHistory();
            });
        });

        // ==================== 主题管理 ====================
        function initTheme() {
            const savedTheme = localStorage.getItem('grsai-nano-banana-theme') || 'dark';
            setTheme(savedTheme, false);

            // 监听系统主题变化
            if (window.matchMedia) {
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
                    if (currentTheme === 'auto') {
                        applyTheme(e.matches ? 'dark' : 'light');
                    }
                });
            }
        }

        function setTheme(theme, save = true) {
            currentTheme = theme;

            // 更新按钮状态
            document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`theme-${theme}`)?.classList.add('active');

            if (save) {
                localStorage.setItem('grsai-nano-banana-theme', theme);
            }

            if (theme === 'auto') {
                const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                applyTheme(prefersDark ? 'dark' : 'light');
            } else {
                applyTheme(theme);

        // ==================== IndexedDB 操作 ====================
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);

                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };

                request.onupgradeneeded = (event) => {
                    const database = event.target.result;
                    if (!database.objectStoreNames.contains(STORE_NAME)) {
                        const store = database.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                        store.createIndex('timestamp', 'timestamp', { unique: false });
                    }
                };
            });
        }

        function addHistoryItem(imageData, prompt) {
            return new Promise((resolve, reject) => {
                if (!db) {
                    reject(new Error('Database not initialized'));
                    return;
                }

                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);

                const item = {
                    imageData: imageData,
                    prompt: prompt,
                    timestamp: Date.now()
                };

                const request = store.add(item);
                request.onsuccess = () => {
                    cleanupOldHistory().then(() => resolve(request.result));
                };
                request.onerror = () => reject(request.error);
            });
        }

        function getAllHistory() {
            return new Promise((resolve, reject) => {
                if (!db) {
                    reject(new Error('Database not initialized'));
                    return;
                }

                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const index = store.index('timestamp');
                const request = index.openCursor(null, 'prev');

                const results = [];
                request.onsuccess = (event) => {
                    const cursor = event.target.result;
                    if (cursor) {
                        results.push(cursor.value);
                        cursor.continue();
                    } else {
                        resolve(results);
                    }
                };
                request.onerror = () => reject(request.error);
            });
        }

        function deleteHistoryItem(id) {
            return new Promise((resolve, reject) => {
                if (!db) {
                    reject(new Error('Database not initialized'));
                    return;
                }

                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.delete(id);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        function clearAllHistory() {
            return new Promise((resolve, reject) => {
                if (!db) {
                    reject(new Error('Database not initialized'));
                    return;
                }

                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.clear();
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        async function cleanupOldHistory() {
            const limit = parseInt(document.getElementById('historyLimit').value) || 20;

                for (const item of toDelete) {

            }

                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>

                            <button class="history-btn" onclick="deleteHistoryItem(${item.id}).then(() => loadHistory())" title="删除">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;

            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}分钟前`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}小时前`;
            if (diff < 604800000) return `${Math.floor(diff / 86400000)}天前`;

            return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
        }

        // ==================== 图片压缩 ====================
        async function compressImage(file) {
            const enableCompression = document.getElementById('enableCompression').checked;
            if (!enableCompression) {
                return file;
            }

            const maxEdge = parseInt(document.getElementById('maxEdgeLength').value) || 2560;
            const quality = parseFloat(document.getElementById('jpegQuality').value) || 0.9;

            return new Promise((resolve, reject) => {
                const img = new Image();
                const url = URL.createObjectURL(file);

                img.onload = () => {
                    URL.revokeObjectURL(url);

                    let { width, height } = img;
                    const maxDim = Math.max(width, height);

                    if (maxDim <= maxEdge && quality >= 1.0) {
                        resolve(file);
                        return;
                    }

                    if (maxDim > maxEdge) {
                        const scale = maxEdge / maxDim;
                        width = Math.round(width * scale);
                        height = Math.round(height * scale);
                    }

                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');

                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(img, 0, 0, width, height);

                    canvas.toBlob((blob) => {
                        if (blob) {
                            const compressedFile = new File([blob], file.name, {
                                type: 'image/jpeg',
                                lastModified: Date.now()
                            });
                            resolve(compressedFile);
                        } else {
                            reject(new Error('Compression failed'));
                        }
                    }, 'image/jpeg', quality);
                };

                img.onerror = () => {
                    URL.revokeObjectURL(url);
                    reject(new Error('Failed to load image'));
                };

                img.src = url;
            });
        }

                slot.onmouseleave = () => activeSlot = null;

                reader.onload = ((idx, slotElement) => (e) => {

                slot.innerHTML = `
                    <input type="file" id="file-${i}" accept="image/*" onchange="handleFileSelect(event, ${i})">

                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                `;
                grid.appendChild(slot);

            if (validImages.length < 14) {
                const addSlot = document.createElement('div');
                addSlot.className = 'image-slot pastable-indicator relative border-2 border-dashed rounded-xl overflow-hidden cursor-pointer group transition-all';
                addSlot.style.borderColor = 'var(--border-input)';
                addSlot.style.background = 'var(--slot-bg)';
                addSlot.ondragover = (e) => { e.preventDefault(); addSlot.classList.add('dragover'); };
                addSlot.ondragleave = (e) => { e.preventDefault(); addSlot.classList.remove('dragover'); };
                addSlot.ondrop = (e) => handleDropOnAddButton(e);
                addSlot.onmouseenter = () => activeSlot = -1;
                addSlot.onmouseleave = () => activeSlot = null;

                const fileInput = document.createElement('input');
                fileInput.type = 'file';
                fileInput.id = 'file-add-new';
                fileInput.accept = 'image/*';
                fileInput.style.display = 'none';
                fileInput.onchange = (e) => handleAddNewImage(e);

                addSlot.onclick = () => fileInput.click();
                addSlot.innerHTML = `
                    <div class="absolute inset-0 flex flex-col items-center justify-center transition-colors" style="color: var(--text-muted);">
                        <svg class="w-8 h-8 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        <span class="text-xs">添加</span>
                    </div>

        async function handleAddNewImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            const validCount = imageFiles.filter(f => f !== null).length;
            if (validCount >= 14) {
                showMessage('最多只能上传14张参考图', 'error');
                return;
            }

            let targetIndex = imageFiles.findIndex(f => f === null);
            if (targetIndex === -1) {
                targetIndex = imageFiles.length;
                imageFiles.push(null);
            }

            try {
                const compressedFile = await compressImage(file);
                imageFiles[targetIndex] = compressedFile;
                renderImageGrid();
            } catch (error) {
                console.error('Image compression failed:', error);
                imageFiles[targetIndex] = file;
                renderImageGrid();
            }
        }

        async function handleDropOnAddButton(e) {
            e.preventDefault();
            e.stopPropagation();

            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type.startsWith('image/')) {
                const validCount = imageFiles.filter(f => f !== null).length;
                if (validCount >= 14) {
                    showMessage('最多只能上传14张参考图', 'error');
                    return;
                }
                let newIndex = imageFiles.findIndex(f => f === null);
                if (newIndex === -1) {
                    newIndex = imageFiles.length;
                    imageFiles.push(null);
                }

                try {
                    const compressedFile = await compressImage(files[0]);
                    imageFiles[newIndex] = compressedFile;
                    renderImageGrid();
                } catch (error) {
                    console.error('Image compression failed:', error);
                    imageFiles[newIndex] = files[0];
                    renderImageGrid();
                }
            }
        }

        // 弹出式 Mention 面板
        function toggleMentionPopup() {

                openMentionPopup();
            }

        function openMentionPopup(keyword = '') {
            const popup = document.getElementById('mentionPopup');
            const btn = document.getElementById('mentionBtn');
            const list = document.getElementById('mentionPopupList');
            const editor = document.getElementById('prompt');

            const sel = window.getSelection();
            if (sel.rangeCount > 0) {
                savedRange = sel.getRangeAt(0).cloneRange();
            }

            popupKeyword = keyword.toLowerCase();
            keyboardSelectedIndex = -1;

            renderMentionList();
            positionPopup();

            popup.classList.add('active');
            btn.classList.add('active');
            isMentionPopupOpen = true;

            editor.focus();
        }

        function positionPopup() {
            const popup = document.getElementById('mentionPopup');
            const editor = document.getElementById('prompt');
            const editorRect = editor.getBoundingClientRect();

            const sel = window.getSelection();
            let cursorX = editorRect.left + 20;
            let cursorY = editorRect.top + 50;

            if (sel.rangeCount > 0) {
                const range = sel.getRangeAt(0);
                const rects = range.getClientRects();
                if (rects.length > 0) {
                    const rect = rects[rects.length - 1];
                    cursorX = rect.left;
                    cursorY = rect.bottom + 5;
                }
            }

            const popupWidth = 220;
            const popupHeight = 280;

            if (cursorX + popupWidth > window.innerWidth) {
                cursorX = window.innerWidth - popupWidth - 20;
            }
            if (cursorY + popupHeight > window.innerHeight) {
                cursorY = editorRect.top - popupHeight - 5;
            }

            popup.style.left = (cursorX - editorRect.left) + 'px';
            popup.style.top = (cursorY - editorRect.top) + 'px';
        }

        function renderMentionList() {
            const list = document.getElementById('mentionPopupList');
            list.innerHTML = '';

            let hasImages = false;
            let visibleCount = 0;

            for (let i = 0; i < imageFiles.length; i++) {
                if (imageFiles[i]) {
                    const tagName = `img${i + 1}`;
                    if (popupKeyword && !tagName.toLowerCase().includes(popupKeyword)) {
                        continue;
                    }

                    hasImages = true;
                    const item = document.createElement('div');
                    item.className = 'mention-popup-item';
                    item.dataset.index = i;
                    item.dataset.visibleIndex = visibleCount;

                    const previewSrc = URL.createObjectURL(imageFiles[i]);
                    item.innerHTML = `
                        <img src="${previewSrc}" alt="img${i + 1}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2240%22 height=%2240%22><rect fill=%22%231e293b%22 width=%2240%22 height=%2240%22/><text fill=%22%2360a5fa%22 x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2214%22>${i + 1}</text></svg>'">
                        <span>@img${i + 1}</span>
                    `;
                    item.onclick = () => selectImageForInsert(i);
                    item.onmouseenter = () => {
                        keyboardSelectedIndex = visibleCount;
                        updateKeyboardSelection();
                    };
                    list.appendChild(item);
                    visibleCount++;
                }
            }

            if (!hasImages) {
                list.innerHTML = `
                    <div class="mention-popup-empty">
                        <div class="icon">🖼️</div>
                        <div>请先上传<br>参考图片</div>
                    </div>`;
            } else if (visibleCount === 0) {
                list.innerHTML = `
                    <div class="mention-popup-empty">
                        <div class="icon">🔍</div>
                        <div>未找到匹配<br>"${popupKeyword}"</div>
                    </div>`;
            }
        }

        function closeMentionPopup() {
            const popup = document.getElementById('mentionPopup');
            const btn = document.getElementById('mentionBtn');

            popup.classList.remove('active');
            btn.classList.remove('active');
            isMentionPopupOpen = false;
            editingChip = null;
            selectedIndex = -1;
            popupKeyword = '';
            keyboardSelectedIndex = -1;
            savedRange = null;
        }

        function selectImageForInsert(index) {
            const editor = document.getElementById('prompt');

            const chipInner = `@img${index + 1} <svg style="width:12px;height:12px;margin-left:2px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>`;

            if (editingChip) {
                editingChip.dataset.index = index;
                editingChip.innerHTML = chipInner;
            } else {
                editor.focus();

                const sel = window.getSelection();
                let range = savedRange;

                if (!range && sel.rangeCount > 0) {
                    range = sel.getRangeAt(0);
                }

                if (range) {
                    sel.removeAllRanges();
                    sel.addRange(range);

                    if (popupKeyword !== null || isMentionPopupOpen) {
                        const textNode = range.startContainer;
                        if (textNode.nodeType === Node.TEXT_NODE) {
                            const text = textNode.textContent;
                            const cursorPos = range.startOffset;
                            const beforeCursor = text.substring(0, cursorPos);
                            const atIndex = beforeCursor.lastIndexOf('@');
                            if (atIndex !== -1) {
                                range.setStart(textNode, atIndex);
                                range.setEnd(textNode, cursorPos);
                                range.deleteContents();
                            }
                        }
                    }

                    const chip = document.createElement('span');
                    chip.className = 'mention-chip';
                    chip.contentEditable = 'false';
                    chip.dataset.index = index;
                    chip.setAttribute('onclick', 'editExistingMention(event, this)');
                    chip.innerHTML = chipInner;

                    range.insertNode(chip);

                    const space = document.createTextNode('\u00A0');
                    chip.parentNode.insertBefore(space, chip.nextSibling);

                    range.setStart(space, 1);
                    range.setEnd(space, 1);
                    sel.removeAllRanges();
                    sel.addRange(range);
                }
            }

            savedRange = null;
            closeMentionPopup();
        }

        function updateKeyboardSelection() {
            const items = document.querySelectorAll('.mention-popup-item');
            items.forEach((item, idx) => {
                if (parseInt(item.dataset.visibleIndex) === keyboardSelectedIndex) {
                    item.classList.add('selected');
                    item.scrollIntoView({ block: 'nearest' });
                } else {
                    item.classList.remove('selected');
                }
            });
        }

        function setupMentionSystem() {
            const editor = document.getElementById('prompt');

            editor.addEventListener('paste', function (e) {
                e.preventDefault();
                const text = (e.originalEvent || e).clipboardData.getData('text/plain');
                document.execCommand('insertText', false, text);
            });

            editor.addEventListener('keydown', function (e) {
                if (e.key === '@') {
                    setTimeout(() => {
                        openMentionPopup();
                    }, 10);
                } else if (isMentionPopupOpen) {
                    handlePopupKeydown(e);
                }
            });

            editor.addEventListener('input', function (e) {
                if (isMentionPopupOpen) {
                    handlePopupInput(e);
                }
            });

            document.addEventListener('click', function (e) {
                const popup = document.getElementById('mentionPopup');
                const btn = document.getElementById('mentionBtn');
                const editor = document.getElementById('prompt');

                if (!popup.contains(e.target) && e.target !== btn && e.target !== editor && !e.target.closest('.mention-chip')) {
                    closeMentionPopup();
                }
            });

            window.addEventListener('resize', function () {
                if (isMentionPopupOpen) {
                    positionPopup();
                }
            });
        }

        function handlePopupKeydown(e) {
            const items = document.querySelectorAll('.mention-popup-item');
            const visibleCount = items.length;

            if (visibleCount === 0) return;

            switch (e.key) {
                case 'Escape':
                    e.preventDefault();
                    closeMentionPopup();
                    removeAtBeforeCursor();
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    keyboardSelectedIndex = (keyboardSelectedIndex + 1) % visibleCount;
                    updateKeyboardSelection();
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    keyboardSelectedIndex = (keyboardSelectedIndex - 1 + visibleCount) % visibleCount;
                    updateKeyboardSelection();
                    break;
                case 'Enter':
                case 'Tab':
                    e.preventDefault();
                    if (keyboardSelectedIndex >= 0) {
                        const selectedItem = document.querySelector(`.mention-popup-item[data-visible-index="${keyboardSelectedIndex}"]`);
                        if (selectedItem) {
                            selectImageForInsert(parseInt(selectedItem.dataset.index));
                        }
                    }
                    break;
            }
        }

        function handlePopupInput(e) {
            const sel = window.getSelection();
            if (sel.rangeCount > 0) {
                const range = sel.getRangeAt(0);
                const textNode = range.startContainer;

                if (textNode.nodeType === Node.TEXT_NODE) {
                    const text = textNode.textContent;
                    const cursorPos = range.startOffset;
                    const beforeCursor = text.substring(0, cursorPos);

                    const atIndex = beforeCursor.lastIndexOf('@');
                    if (atIndex !== -1) {
                        const keyword = beforeCursor.substring(atIndex + 1);
                        if (!keyword.includes(' ') && !keyword.includes('\n')) {
                            popupKeyword = keyword;
                            renderMentionList();
                            if (document.querySelectorAll('.mention-popup-item').length > 0) {
                                keyboardSelectedIndex = 0;
                                updateKeyboardSelection();
                            }
                            return;
                        }
                    }
                }
            }
            closeMentionPopup();
        }

        function removeAtBeforeCursor() {
            const editor = document.getElementById('prompt');
            const sel = window.getSelection();
            if (sel.rangeCount > 0) {
                const range = sel.getRangeAt(0);
                const textNode = range.startContainer;
                if (textNode.nodeType === Node.TEXT_NODE) {
                    const text = textNode.textContent;
                    const cursorPos = range.startOffset;
                    const beforeCursor = text.substring(0, cursorPos);
                    const atIndex = beforeCursor.lastIndexOf('@');
                    if (atIndex !== -1 && atIndex === cursorPos - 1) {
                        range.setStart(textNode, atIndex);
                        range.setEnd(textNode, cursorPos);
                        range.deleteContents();
                    }
                }
            }
        }

        function editExistingMention(event, element) {

        function getParsedPromptText() {
            const editor = document.getElementById('prompt');
            let text = '';

            function traverse(node) {
                if (node.nodeType === Node.TEXT_NODE) {
                    text += node.textContent.replace(/\u00A0/g, ' ');
                } else if (node.nodeType === Node.ELEMENT_NODE) {
                    if (node.classList.contains('mention-chip')) {
                        const idx = parseInt(node.dataset.index) + 1;
                        text += `【image${idx}】`;
                    } else if (node.tagName === 'BR') {
                        text += '\n';
                    } else {
                        for (let child of node.childNodes) {
                            traverse(child);
                        }
                        if ((node.tagName === 'DIV' || node.tagName === 'P') && node.nextSibling) {
                            text += '\n';
                        }
                    }
                }
            }

            traverse(editor);
            return text.replace(/\n{3,}/g, '\n\n').trim();
        }

        function removeImage(e, index) {

            imageFiles[index] = null;

            while (imageFiles.length > 0 && imageFiles[imageFiles.length - 1] === null) {

        function updatePromptMentionsAfterRemoval(removedIndex) {
            const editor = document.getElementById('prompt');
            const chips = editor.querySelectorAll('.mention-chip');

            chips.forEach(chip => {
                const chipIndex = parseInt(chip.dataset.index);
                if (chipIndex === removedIndex) {
                    const nextSibling = chip.nextSibling;
                    chip.remove();
                    if (nextSibling && nextSibling.nodeType === Node.TEXT_NODE && nextSibling.textContent === '\u00A0') {
                        nextSibling.remove();
                    }
                } else if (chipIndex > removedIndex) {
                    const newIndex = chipIndex - 1;
                    chip.dataset.index = newIndex;
                    chip.innerHTML = `@img${newIndex + 1} <svg style="width:12px;height:12px;margin-left:2px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>`;
                }
            });
        }

        function clearAllImages() {

            renderImageGrid();
            const editor = document.getElementById('prompt');
            const chips = editor.querySelectorAll('.mention-chip');
            chips.forEach(chip => {
                const nextSibling = chip.nextSibling;
                chip.remove();
                if (nextSibling && nextSibling.nodeType === Node.TEXT_NODE && nextSibling.textContent === '\u00A0') {

                }
            });
        }

        function setupPasteListener() {
            document.addEventListener('paste', async (e) => {
                if (document.activeElement.id === 'prompt' || document.activeElement.isContentEditable) return;

                const items = e.clipboardData.items;
                for (let item of items) {
                    if (item.type.indexOf('image') !== -1) {
                        const validCount = imageFiles.filter(f => f !== null).length;
                        if (validCount >= 14) {
                            showMessage('最多只能上传14张参考图', 'error');
                            return;
                        }

                        const blob = item.getAsFile();
                        const file = new File([blob], `pasted-image-${Date.now()}.png`, { type: blob.type });

                        let targetIndex;
                        if (activeSlot === -1) {
                            targetIndex = imageFiles.findIndex(f => f === null);
                            if (targetIndex === -1) {
                                targetIndex = imageFiles.length;
                                imageFiles.push(null);
                            }
                        } else if (activeSlot !== null && activeSlot < imageFiles.length && !imageFiles[activeSlot]) {
                            targetIndex = activeSlot;
                        } else {
                            targetIndex = imageFiles.findIndex(f => f === null);
                            if (targetIndex === -1) {
                                targetIndex = imageFiles.length;
                                imageFiles.push(null);
                            }
                        }

                        try {
                            const compressedFile = await compressImage(file);
                            imageFiles[targetIndex] = compressedFile;
                            renderImageGrid();
                        } catch (error) {
                            console.error('Image compression failed:', error);
                            imageFiles[targetIndex] = file;
                            renderImageGrid();
                        }
                        break;
                    }
                }
            });
        }

        // ==================== 任务队列管理 ====================
        
        // 创建新任务
        function createTask(baseUrl, apiKey, model, prompt, aspectRatio, imageSize, validImages) {
            taskIdCounter++;
            const localTaskId = `local-${Date.now()}-${taskIdCounter}`;
            
            const task = {
                id: localTaskId,
                baseUrl,
                apiKey,
                model,
                prompt,
                aspectRatio,
                imageSize,
                images: validImages,
                status: 'pending', // pending, submitting, polling, completed, failed
                serverTaskId: null,
                progress: '0%',
                result: null,
                error: null,
                startTime: Date.now(),
                pollTimer: null,
                pollAttempts: 0
            };
            
            taskQueue.push(task);
            processTaskQueue();
            return localTaskId;
        }

        // 处理任务队列
        async function processTaskQueue() {
            const maxConcurrency = parseInt(document.getElementById('maxConcurrency').value) || 3;
            
            // 如果当前运行任务已达最大并发数，则返回
            if (runningTaskCount >= maxConcurrency) {
                return;
            }
            
            // 获取下一个待处理任务
            const taskIndex = taskQueue.findIndex(t => t.status === 'pending');
            if (taskIndex === -1) {
                return;
            }
            
            const task = taskQueue[taskIndex];
            task.status = 'submitting';
            runningTaskCount++;
            
            try {
                await executeTask(task);
            } catch (error) {
                console.error('Task execution error:', error);
                task.status = 'failed';
                task.error = error.message;
                runningTaskCount--;
                updateTaskUI(task);
                processTaskQueue(); // 尝试处理下一个任务
            }
        }

        // 执行单个任务
        async function executeTask(task) {
            // 将参考图转换为Base64
            const imageUrls = [];
            if (task.images && task.images.length > 0) {
                for (const file of task.images) {
                    const base64 = await fileToBase64(file);
                    imageUrls.push(base64);
                }
            }

            // 构建请求体
            const requestBody = {
                model: task.model,
                prompt: task.prompt,
                aspectRatio: task.aspectRatio || 'auto',
                imageSize: task.imageSize || '1K',
                shutProgress: false,
                webHook: "-1"  // 设置为-1立即返回id，用于轮询
            };

            // 只有有参考图时才添加urls字段
            if (imageUrls.length > 0) {
                requestBody.urls = imageUrls;
            }

            const url = `${task.baseUrl}/v1/draw/nano-banana`;

            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${task.apiKey}`
                },
                body: JSON.stringify(requestBody)
            });

            // 获取原始响应文本用于调试
            const responseText = await response.text();
            
            // 尝试解析JSON
            let data;
            try {
                data = JSON.parse(responseText);
            } catch (parseError) {
                console.error('JSON解析错误，原始响应:', responseText);
                throw new Error(`服务器返回非JSON格式: ${responseText.substring(0, 200)}`);
            }

            if (!response.ok || data.code !== 0) {
                throw new Error(data.msg || data.error?.message || `HTTP ${response.status}: ${response.statusText}`);
            }

            // 获取服务端任务ID并开始轮询
            const serverTaskId = data.data?.id;
            if (!serverTaskId) {
                throw new Error('未能获取任务ID');
            }

            task.serverTaskId = serverTaskId;
            task.status = 'polling';
            updateTaskUI(task);

            // 开始轮询
            startPolling(task);
        }

        // 将文件转换为Base64
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // 开始轮询任务状态
        function startPolling(task) {
            const pollInterval = (parseInt(document.getElementById('pollInterval').value) || 5) * 1000;
            const maxAttempts = 120; // 最多轮询120次
            
            const poll = async () => {
                task.pollAttempts++;
                
                try {
                    const response = await fetch(`${task.baseUrl}/v1/draw/result`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${task.apiKey}`
                        },
                        body: JSON.stringify({ id: task.serverTaskId })
                    });

                    // 获取原始响应文本用于调试
                    const responseText = await response.text();
                    
                    // 尝试解析JSON
                    let data;
                    try {
                        data = JSON.parse(responseText);
                    } catch (parseError) {
                        console.error('轮询JSON解析错误，原始响应:', responseText);
                        throw new Error(`服务器返回非JSON格式: ${responseText.substring(0, 200)}`);
                    }

                    if (!response.ok || data.code !== 0) {
                        throw new Error(data.msg || data.error?.message || `查询任务失败: HTTP ${response.status}`);
                    }

                    const taskData = data.data || data;
                    const status = taskData.status;

                    if (status === 'succeeded') {
                        // 任务完成
                        clearInterval(task.pollTimer);
                        task.status = 'completed';
                        task.result = taskData;
                        task.progress = taskData.progress || '100%';
                        runningTaskCount--;
                        
                        // 显示结果并保存到历史记录
                        displayTaskResult(task);
                        await saveTaskResultToHistory(task);
                        updateTaskUI(task);
                        
                        // 尝试处理下一个任务
                        processTaskQueue();
                        
                    } else if (status === 'failed') {
                        // 任务失败
                        clearInterval(task.pollTimer);
                        task.status = 'failed';
                        task.error = taskData.failure_reason || '任务生成失败';
                        runningTaskCount--;
                        updateTaskUI(task);
                        processTaskQueue(); // 尝试处理下一个任务
                        
                    } else {
                        // 任务处理中，更新进度
                        task.progress = taskData.progress ? `${taskData.progress}%` : `${Math.min(Math.round(task.pollAttempts / maxAttempts * 100), 99)}%`;
                        updateTaskUI(task);
                    }

                    if (task.pollAttempts >= maxAttempts) {
                        clearInterval(task.pollTimer);
                        task.status = 'failed';
                        task.error = '任务超时，请稍后在历史记录中查看结果';
                        runningTaskCount--;
                        updateTaskUI(task);
                        processTaskQueue(); // 尝试处理下一个任务
                    }
                } catch (error) {
                    clearInterval(task.pollTimer);
                    task.status = 'failed';
                    task.error = error.message;
                    runningTaskCount--;
                    updateTaskUI(task);
                    processTaskQueue(); // 尝试处理下一个任务
                    console.error('Poll error:', error);
                }
            };

            // 立即执行一次，然后定期轮询
            poll();
            task.pollTimer = setInterval(poll, pollInterval);
        }

        // 显示任务结果
        function displayTaskResult(task) {
            const resultArea = document.getElementById('resultArea');
            const resultImage = document.getElementById('resultImage');
            const downloadLink = document.getElementById('downloadLink');
            const jsonResult = document.getElementById('jsonResult');

            resultArea.classList.remove('hidden');

            // 新的API响应格式: task.result.results[0].url
            if (task.result && task.result.results && task.result.results[0] && task.result.results[0].url) {
                resultImage.src = task.result.results[0].url;
                downloadLink.href = task.result.results[0].url;
                downloadLink.download = `generated-${Date.now()}.png`;
                if (jsonResult) jsonResult.classList.add('hidden');
            } else {
                showMessage('返回数据格式异常', 'error');
                if (jsonResult) {
                    jsonResult.textContent = JSON.stringify(task.result, null, 2);
                    jsonResult.classList.remove('hidden');
                }
            }

            resultArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // 保存任务结果到历史记录
        async function saveTaskResultToHistory(task) {
            try {
                let imageData = null;

                // 新的API响应格式: task.result.results[0].url
                if (task.result && task.result.results && task.result.results[0] && task.result.results[0].url) {
                    try {
                        const response = await fetch(task.result.results[0].url);
                        const blob = await response.blob();
                        imageData = await blobToBase64(blob);
                    } catch (e) {
                        console.error('Failed to fetch image from URL:', e);
                        imageData = task.result.results[0].url;
                    }
                }

                if (imageData) {
                    await addHistoryItem(imageData, task.prompt);
                    await loadHistory();
                }
            } catch (error) {
                console.error('Failed to save to history:', error);
            }
        }

        // 当前选中的任务ID
        let selectedTaskId = null;

        // 更新任务UI
        function updateTaskUI(changedTask) {
            const taskContainer = document.getElementById('taskContainer');
            const taskCountEl = document.getElementById('taskCount');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('btnLoader');
            
            const pendingCount = taskQueue.filter(t => t.status === 'pending').length;
            const runningCount = taskQueue.filter(t => t.status === 'submitting' || t.status === 'polling').length;
            const completedCount = taskQueue.filter(t => t.status === 'completed').length;
            const failedCount = taskQueue.filter(t => t.status === 'failed').length;
            
            // 更新按钮状态
            if (runningCount > 0) {
                btnText.textContent = '生成中...';
                loader.classList.remove('hidden');
            } else if (pendingCount > 0) {
                btnText.textContent = '等待中...';
                loader.classList.remove('hidden');
            } else {
                btnText.textContent = '生成图像';
                loader.classList.add('hidden');
            }
            
            // 更新任务数量
            taskCountEl.textContent = taskQueue.length;
            
            // 渲染任务列表
            if (taskQueue.length === 0) {
                taskContainer.innerHTML = `
                    <div class="text-center py-8 text-sm" style="color: var(--text-muted);">
                        暂无任务
                    </div>
                `;
            } else {
                taskContainer.innerHTML = taskQueue.slice().reverse().map(task => {
                    const isSelected = task.id === selectedTaskId;
                    const progress = parseInt(task.progress) || 0;
                    const statusText = {
                        'pending': '等待中',
                        'submitting': '提交中',
                        'polling': '生成中',
                        'completed': '已完成',
                        'failed': '失败'
                    }[task.status] || task.status;
                    
                    return `
                        <div class="task-item ${task.status} ${isSelected ? 'selected' : ''}" 
                             onclick="selectTask('${task.id}')">
                            <div class="task-header">
                                <span class="task-id">${task.id.slice(-8)}</span>
                                <span class="task-status ${task.status}">${statusText}</span>
                            </div>
                            <div class="task-prompt" title="${escapeHtml(task.prompt)}">${escapeHtml(task.prompt)}</div>
                            ${task.status === 'polling' || task.status === 'submitting' ? `
                                <div class="task-progress-bar">
                                    <div class="task-progress-fill" style="width: ${progress}%"></div>
                                </div>
                                <div class="task-progress-text">${progress}%</div>
                            ` : ''}
                            ${task.status === 'failed' ? `
                                <div class="task-progress-text" style="color: #ef4444;">${escapeHtml(task.error || '未知错误')}</div>
                            ` : ''}
                        </div>
                    `;
                }).join('');
            }
            
            // 如果有选中的任务，显示调试信息
            if (selectedTaskId) {
                renderTaskDebugPanel();
            }
            
            // 如果有状态变化，显示消息
            if (changedTask) {
                if (changedTask.status === 'completed') {
                    showMessage(`任务 ${changedTask.id.slice(-4)} 完成`, 'success');
                } else if (changedTask.status === 'failed') {
                    showMessage(`任务 ${changedTask.id.slice(-4)} 失败: ${changedTask.error}`, 'error');
                }
            }
        }

        // 选择任务
        function selectTask(taskId) {
            selectedTaskId = taskId;
            updateTaskUI();
        }

        // 渲染任务调试面板
        function renderTaskDebugPanel() {
            const task = taskQueue.find(t => t.id === selectedTaskId);
            if (!task) return;
            
            const debugInfo = {
                id: task.id,
                serverTaskId: task.serverTaskId,
                status: task.status,
                progress: task.progress,
                prompt: task.prompt,
                model: task.model,
                aspectRatio: task.aspectRatio,
                resolution: task.imageSize,
                imageSize: task.imageSize,
                imageCount: task.images.length,
                error: task.error,
                pollAttempts: task.pollAttempts,
                startTime: new Date(task.startTime).toLocaleString(),
                result: task.result ? '已返回数据' : null
            };
            
            // 检查是否已存在调试面板
            let debugPanel = document.getElementById('taskDebugPanel');
            if (!debugPanel) {
                debugPanel = document.createElement('div');
                debugPanel.id = 'taskDebugPanel';
                debugPanel.className = 'task-debug-panel';
                document.getElementById('taskContainer').parentNode.appendChild(debugPanel);
            }
            
            debugPanel.innerHTML = `
                <div class="task-debug-header">
                    <span>任务调试信息</span>
                    <button onclick="closeTaskDebugPanel()" style="background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px;">✕</button>
                </div>
                <div class="task-debug-content">${JSON.stringify(debugInfo, null, 2)}</div>
            `;
        }

        // 关闭任务调试面板
        function closeTaskDebugPanel() {
            selectedTaskId = null;
            const debugPanel = document.getElementById('taskDebugPanel');
            if (debugPanel) {
                debugPanel.remove();
            }
            updateTaskUI();
        }

        // 清理所有任务
        function clearAllTasks() {
            if (taskQueue.length === 0) return;
            
            // 停止所有轮询定时器
            taskQueue.forEach(task => {
                if (task.pollTimer) {
                    clearInterval(task.pollTimer);
                }
            });
            
            taskQueue = [];
            runningTaskCount = 0;
            selectedTaskId = null;
            
            const debugPanel = document.getElementById('taskDebugPanel');
            if (debugPanel) {
                debugPanel.remove();
            }
            
            updateTaskUI();
            showMessage('任务列表已清理', 'success');
        }

        // HTML转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 图像生成 - 使用任务队列
        async function generateImage() {
            const baseUrl = document.getElementById('baseUrl').value.trim();
            const apiKey = document.getElementById('apiKey').value.trim();
            const model = document.getElementById('modelName').value.trim();
            const prompt = getParsedPromptText();
            const aspectRatio = document.getElementById('aspectRatio').value;
            const imageSize = document.getElementById('imageSize').value;

            if (!baseUrl || !apiKey) {
                showMessage('请填写 API Base URL 和 API Key', 'error');
                return;
            }
            if (!prompt) {
                showMessage('请输入提示词', 'error');
                return;
            }

            const validImages = imageFiles.filter(f => f !== null);

            hideMessage();

            // 创建新任务并加入队列
            const taskId = createTask(baseUrl, apiKey, model, prompt, aspectRatio, imageSize, validImages);
            
            showMessage('任务已添加到队列', 'success');
            
            // 更新按钮状态
            updateTaskUI({ status: 'pending' });
        }

        function blobToBase64(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        }

        function showMessage(msg, type) {
            const area = document.getElementById('messageArea');
            area.textContent = msg;
            area.classList.remove('hidden');
            area.style.cssText = '';

            if (type === 'error') {
                area.style.background = 'rgba(239, 68, 68, 0.2)';
                area.style.color = '#ef4444';
                area.style.border = '1px solid rgba(239, 68, 68, 0.3)';
            } else {
                area.style.background = 'rgba(34, 197, 94, 0.2)';
                area.style.color = '#22c55e';
                area.style.border = '1px solid rgba(34, 197, 94, 0.3)';
            }
        }

        function hideMessage() {
            document.getElementById('messageArea').classList.add('hidden');
        }

        // 键盘快捷键关闭模态框
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeImageModal();
            }
        });
    </script>
</body>

</html>
