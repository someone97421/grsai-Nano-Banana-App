        // ==================== 任务队列管理 ====================
        
        // 创建新任务
        function createTask(baseUrl, apiKey, providerId, prompt, params, validImages) {
            // 检查任务数量上限
            const taskLimit = parseInt(document.getElementById('taskLimit').value) || 50;
            while (taskQueue.length >= taskLimit) {
                const removed = taskQueue.shift();
                if (removed.pollTimer) clearInterval(removed.pollTimer);
            }
            taskIdCounter++;
            const localTaskId = `local-${Date.now()}-${taskIdCounter}`;
            const profile = MODEL_PROFILES[providerId] || MODEL_PROFILES['nano-banana'];
            
            let model = profile.model;
            if ((profile.id === 'nano-banana' || profile.id === 'gpt-image-2') && params?.modelVariant) {
                model = params.modelVariant;
            }
            
            const task = {
                id: localTaskId,
                baseUrl,
                apiKey,
                providerId,
                model,
                prompt,
                params,
                images: validImages,
                status: 'pending', // pending, submitting, polling, completed, failed
                serverTaskId: null,
                progress: '0%',
                result: null,
                error: null,
                startTime: Date.now(),
                pollTimer: null,
                pollAttempts: 0,
                requestHistory: []
            };
            
            taskQueue.push(task);
            saveTaskQueue().catch(() => {});
            processTaskQueue();
            return localTaskId;
        }

        // 处理任务队列
        async function processTaskQueue() {
            const maxConcurrency = parseInt(document.getElementById('maxConcurrency').value) || 3;
            
            // 如果当前运行任务已达最大并发数，则返回
            if (runningTaskCount >= maxConcurrency) {
                return;
            }
            
            // 获取下一个待处理任务
            const taskIndex = taskQueue.findIndex(t => t.status === 'pending');
            if (taskIndex === -1) {
                return;
            }
            
            const task = taskQueue[taskIndex];
            task.status = 'submitting';
            runningTaskCount++;
            
            try {
                await executeTask(task);
            } catch (error) {
                console.error('Task execution error:', error);
                task.status = 'failed';
                task.error = error.message;
                runningTaskCount--;
                updateTaskUI(task);
                processTaskQueue(); // 尝试处理下一个任务
            }
        }

        // 执行单个任务
        async function executeTask(task) {
            const profile = MODEL_PROFILES[task.providerId] || MODEL_PROFILES['nano-banana'];
            let currentImages = [...task.images];
            let response, data;

            if (task.providerId === 'nano-banana') {
                response = await submitNanoBananaTask(task, currentImages);
            } else if (task.providerId === 'gpt-image-2') {
                response = await submitGptImageTask(task, currentImages);
            } else {
                throw new Error('未知的 provider: ' + task.providerId);
            }

            data = await parseResponseJson(response, task);

            if (!response.ok) {
                throw new Error(data.error?.message || `HTTP ${response.status}: ${response.statusText}`);
            }

            // 获取服务端任务ID并开始轮询
            const serverTaskId = data.id || data.data?.id || data.data?.task_id || data.task_id || data.data;
            if (!serverTaskId) {
                throw new Error('未能获取任务ID');
            }

            task.serverTaskId = serverTaskId;
            task.status = 'polling';
            updateTaskUI(task);

            // 开始轮询
            startPolling(task);
        }

        // 兼容 SSE / data: 前缀的 JSON 解析
        async function parseResponseJson(response, task = null) {
            const text = await response.text();
            // 先保存原始响应，方便调试
            if (task) {
                task.rawResponse = text;
            }

            const lines = text.split(/\r?\n/);

            // 1. 先尝试直接解析整个文本
            try {
                return JSON.parse(text.trim());
            } catch (e) { /* 不是纯 JSON */ }

            // 2. 收集所有 data: 行的内容
            const dataLines = [];
            for (const line of lines) {
                const trimmed = line.trim();
                if (trimmed.startsWith('data:')) {
                    dataLines.push(trimmed.replace(/^data:\s*/, ''));
                }
            }

            if (dataLines.length > 0) {
                // 尝试拼接所有 data: 行
                try {
                    return JSON.parse(dataLines.join('\n'));
                } catch (e) { /* 拼接后也不是 JSON */ }

                // 逐行尝试解析，返回第一个成功的 JSON
                for (const line of dataLines) {
                    try {
                        return JSON.parse(line);
                    } catch (e) { /* 这一行不是 JSON */ }
                }
            }

            // 3. 尝试从文本中提取第一个 JSON 对象/数组
            const jsonMatch = text.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
            if (jsonMatch) {
                try {
                    return JSON.parse(jsonMatch[1]);
                } catch (e) { /* 也不对 */ }
            }

            const err = new Error(`解析响应失败: 无法识别返回格式`);
            err.rawResponse = text;
            throw err;
        }

        function abbreviateMiddle(value, head = 12, tail = 8) {
            if (typeof value !== 'string') return value;
            if (value.length <= head + tail + 6) return value;
            return `${value.slice(0, head)}...${value.slice(-tail)} (${value.length} chars)`;
        }

        function sanitizeDebugValue(value, key = '') {
            if (typeof value === 'string') {
                if (/authorization/i.test(key)) {
                    return value.replace(/Bearer\s+(.+)/i, (_, token) => `Bearer ${abbreviateMiddle(token, 8, 6)}`);
                }
                if (/api[-_]?key|token|secret/i.test(key)) {
                    return abbreviateMiddle(value, 8, 6);
                }
                if (/^data:image\/[^;]+;base64,/.test(value)) {
                    const [prefix, base64 = ''] = value.split(',');
                    return `${prefix},${abbreviateMiddle(base64, 18, 12)}`;
                }
                if (/base64|b64|image/i.test(key) && value.length > 120) {
                    return abbreviateMiddle(value, 18, 12);
                }
                return value;
            }

            if (Array.isArray(value)) {
                return value.map(item => sanitizeDebugValue(item, key));
            }

            if (value && typeof value === 'object') {
                return Object.fromEntries(
                    Object.entries(value).map(([childKey, childValue]) => [childKey, sanitizeDebugValue(childValue, childKey)])
                );
            }

            return value;
        }

        function recordTaskRequest(task, request) {
            if (!task) return;
            if (!Array.isArray(task.requestHistory)) {
                task.requestHistory = [];
            }
            task.requestHistory.push({
                time: new Date().toLocaleString(),
                ...sanitizeDebugValue(request)
            });
            if (task.requestHistory.length > 20) {
                task.requestHistory = [
                    task.requestHistory[0],
                    ...task.requestHistory.slice(-19)
                ];
            }
        }

        async function submitNanoBananaTask(task, currentImages) {
            const payload = {
                model: task.model,
                prompt: task.prompt,
                shutProgress: true,
                cdn: 'zh',
                webHook: '-1'
            };

            if (task.params?.aspectRatio) {
                payload.aspectRatio = task.params.aspectRatio;
            }
            if (task.params?.imageSize) {
                payload.imageSize = task.params.imageSize;
            }

            // 根据有无参考图自动切换文生图 / 图生图
            if (currentImages.length > 0) {
                payload.urls = await Promise.all(currentImages.map(file => blobToBase64(file)));
            }

            const url = `${task.baseUrl}/v1/draw/nano-banana`;
            const requestOptions = {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${task.apiKey}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            };
            recordTaskRequest(task, {
                url,
                ...requestOptions,
                body: payload
            });

            return fetch(url, requestOptions);
        }

        async function submitGptImageTask(task, currentImages) {
            const payload = {
                model: task.model,
                prompt: task.prompt,
                shutProgress: true,
                cdn: 'zh',
                webHook: '-1'
            };

            // GPT Image API 使用 aspectRatio 字段传递像素比例
            if (task.params?.aspectRatio) {
                payload.aspectRatio = task.params.aspectRatio;
            }

            // replyType 支持
            if (task.params?.replyType) {
                payload.replyType = task.params.replyType;
            }

            // 根据有无参考图自动切换
            if (currentImages.length > 0) {
                payload.urls = await Promise.all(currentImages.map(file => blobToBase64(file)));
            }

            const url = `${task.baseUrl}/v1/draw/completions`;
            const requestOptions = {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${task.apiKey}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            };
            recordTaskRequest(task, {
                url,
                ...requestOptions,
                body: payload
            });

            return fetch(url, requestOptions);
        }

        // 开始轮询任务状态
        function startPolling(task) {
            // Nano Banana 和 GPT Image 2 均使用 GrsAI /v1/draw/result 轮询
            startNanoBananaPolling(task);
        }

        function startNanoBananaPolling(task) {
            const pollInterval = (parseInt(document.getElementById('pollInterval').value) || 8) * 1000;
            const maxAttempts = 120;

            const poll = async () => {
                task.pollAttempts++;

                try {
                    const url = `${task.baseUrl}/v1/draw/result`;
                    const requestBody = { id: task.serverTaskId };
                    const requestOptions = {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${task.apiKey}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(requestBody)
                    };
                    recordTaskRequest(task, {
                        url,
                        ...requestOptions,
                        body: requestBody
                    });

                    const response = await fetch(url, requestOptions);

                    const data = await parseResponseJson(response, task);

                    if (!response.ok) {
                        throw new Error(data.error?.message || `查询任务失败: HTTP ${response.status}`);
                    }

                    // 兼容 {code, data, msg} 包装格式
                    if (data.code !== undefined && data.code !== 0) {
                        clearInterval(task.pollTimer);
                        task.status = 'failed';
                        task.error = data.msg || `服务端返回错误码: ${data.code}`;
                        runningTaskCount--;
                        updateTaskUI(task);
                        processTaskQueue();
                        return;
                    }

                    const taskData = data.data || data;
                    const status = taskData.status;

                    if (status === 'succeeded') {
                        clearInterval(task.pollTimer);
                        task.status = 'completed';
                        task.result = taskData;
                        task.progress = '100%';
                        runningTaskCount--;
                        displayTaskResult(task);
                        await saveTaskResultToHistory(task);
                        updateTaskUI(task);
                        processTaskQueue();

                    } else if (status === 'failed') {
                        clearInterval(task.pollTimer);
                        task.status = 'failed';
                        task.error = taskData.error || taskData.failure_reason || '任务生成失败';
                        runningTaskCount--;
                        updateTaskUI(task);
                        processTaskQueue();

                    } else if (['processing', 'pending', 'running'].includes(status)) {
                        task.progress = `${taskData.progress || Math.min(Math.round(task.pollAttempts / maxAttempts * 100), 99)}%`;
                        updateTaskUI(task);
                    }

                    if (task.pollAttempts >= maxAttempts) {
                        clearInterval(task.pollTimer);
                        task.status = 'failed';
                        task.error = '任务超时，请稍后在历史记录中查看结果';
                        runningTaskCount--;
                        updateTaskUI(task);
                        processTaskQueue();
                    }
                } catch (error) {
                    clearInterval(task.pollTimer);
                    task.status = 'failed';
                    task.error = error.message;
                    runningTaskCount--;
                    updateTaskUI(task);
                    processTaskQueue();
                    console.error('Poll error:', error);
                }
            };

            poll();
            task.pollTimer = setInterval(poll, pollInterval);
        }

        function startGptImagePolling(task) {
            const pollInterval = (parseInt(document.getElementById('pollInterval').value) || 8) * 1000;
            const maxAttempts = 120;

            const poll = async () => {
                task.pollAttempts++;

                try {
                    const url = `${task.baseUrl}/images/tasks/${task.serverTaskId}`;
                    const requestOptions = {
                        method: 'GET',
                        headers: {
                            'Authorization': `Bearer ${task.apiKey}`,
                            'Content-Type': 'application/json'
                        }
                    };
                    recordTaskRequest(task, {
                        url,
                        ...requestOptions
                    });

                    const response = await fetch(url, requestOptions);

                    const data = await parseResponseJson(response, task);

                    if (!response.ok) {
                        throw new Error(data.error?.message || `查询任务失败: HTTP ${response.status}`);
                    }

                    const taskData = data.data || data;
                    const status = taskData.status;

                    if (status === 'SUCCESS') {
                        clearInterval(task.pollTimer);
                        task.status = 'completed';
                        task.result = taskData.data || data;
                        task.progress = '100%';
                        runningTaskCount--;
                        displayTaskResult(task);
                        await saveTaskResultToHistory(task);
                        updateTaskUI(task);
                        processTaskQueue();

                    } else if (status === 'FAILURE') {
                        clearInterval(task.pollTimer);
                        task.status = 'failed';
                        task.error = taskData.fail_reason || '任务生成失败';
                        runningTaskCount--;
                        updateTaskUI(task);
                        processTaskQueue();

                    } else if (status === 'IN_PROGRESS') {
                        task.progress = `${taskData.progress || Math.min(Math.round(task.pollAttempts / maxAttempts * 100), 99)}%`;
                        updateTaskUI(task);
                    }

                    if (task.pollAttempts >= maxAttempts) {
                        clearInterval(task.pollTimer);
                        task.status = 'failed';
                        task.error = '任务超时，请稍后在历史记录中查看结果';
                        runningTaskCount--;
                        updateTaskUI(task);
                        processTaskQueue();
                    }
                } catch (error) {
                    clearInterval(task.pollTimer);
                    task.status = 'failed';
                    task.error = error.message;
                    runningTaskCount--;
                    updateTaskUI(task);
                    processTaskQueue();
                    console.error('Poll error:', error);
                }
            };

            poll();
            task.pollTimer = setInterval(poll, pollInterval);
        }

        // 显示任务结果
        function displayTaskResult(task) {
            const resultArea = document.getElementById('resultArea');
            const resultImage = document.getElementById('resultImage');
            const downloadLink = document.getElementById('downloadLink');
            const jsonResult = document.getElementById('jsonResult');
            const imageSrc = extractImageSource(task.result);

            resultArea.classList.remove('hidden');

            if (imageSrc) {
                resultImage.src = imageSrc;
                downloadLink.href = imageSrc;
                downloadLink.download = `generated-${Date.now()}.png`;
                if (jsonResult) jsonResult.classList.add('hidden');
            } else {
                showMessage('返回数据格式异常', 'error');
                if (jsonResult) {
                    jsonResult.textContent = JSON.stringify(task.result, null, 2);
                    jsonResult.classList.remove('hidden');
                }
            }

            resultArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // 保存任务结果到历史记录
        async function saveTaskResultToHistory(task) {
            try {
                const imageSrc = extractImageSource(task.result);
                let imageData = null;

                if (imageSrc) {
                    try {
                        const response = await fetch(imageSrc);
                        const blob = await response.blob();
                        imageData = await blobToBase64(blob);
                    } catch (e) {
                        console.error('Failed to fetch image from URL:', e);
                        imageData = imageSrc;
                    }
                }

                if (imageData) {
                    await addHistoryItem(imageData, task.prompt);
                    await loadHistory();
                }
            } catch (error) {
                console.error('Failed to save to history:', error);
            }
        }

        // 当前展开详情的任务ID（互斥，同时只能展开一个）
        let openTaskId = null;

        // 状态文本映射
        const TASK_STATUS_TEXT = {
            'pending': '等待中',
            'submitting': '提交中',
            'polling': '生成中',
            'completed': '已完成',
            'failed': '失败'
        };

        // 格式化用时（毫秒 -> 人类可读）
        function formatDuration(ms) {
            if (ms < 1000) return `${ms}ms`;
            const sec = Math.round(ms / 1000);
            if (sec < 60) return `${sec}s`;
            const min = Math.floor(sec / 60);
            const remSec = sec % 60;
            return `${min}m ${remSec}s`;
        }

        // 任务计时定时器
        let taskTimerInterval = null;

        // 构建计时文本
        function buildTimerText(task) {
            if (task.status === 'pending') return '';
            if (task.endTime) {
                return '用时 ' + formatDuration(task.endTime - task.startTime);
            }
            const elapsed = Date.now() - task.startTime;
            return '已运行 ' + formatDuration(elapsed);
        }

        // 启动任务计时刷新
        function startTaskTimer() {
            if (taskTimerInterval) return;
            taskTimerInterval = setInterval(() => {
                document.querySelectorAll('.task-timer').forEach(el => {
                    const taskId = el.dataset.taskId;
                    const task = taskQueue.find(t => t.id === taskId);
                    if (task && !task.endTime) {
                        el.textContent = buildTimerText(task);
                    }
                });
            }, 1000);
        }

        // 停止任务计时刷新
        function stopTaskTimer() {
            if (taskTimerInterval) {
                clearInterval(taskTimerInterval);
                taskTimerInterval = null;
            }
        }

        // 创建任务卡片 DOM 元素
        function createTaskElement(task) {
            const el = document.createElement('div');
            el.className = `task-item ${task.status}`;
            el.dataset.taskId = task.id;
            el.innerHTML = buildTaskInnerHTML(task);
            return el;
        }

        // 构建任务卡片内部 HTML
        function buildTaskInnerHTML(task) {
            const progress = parseInt(task.progress) || 0;
            const statusText = TASK_STATUS_TEXT[task.status] || task.status;
            const modelLabel = escapeHtml(MODEL_PROFILES[task.providerId]?.label || task.model);
            const isOpen = task.id === openTaskId;
            const timerText = buildTimerText(task);

            return `
                <div class="task-summary" onclick="event.stopPropagation(); toggleTaskDetail('${task.id}')">
                    <div class="task-detail-toggle">
                        <div class="task-header" style="flex:1; margin-bottom:0;">
                            <span class="task-id">${task.id.slice(-8)}</span>
                            <span class="task-status ${task.status}">${statusText}</span>
                        </div>
                        <div style="display:flex; align-items:center; gap:6px;">
                            <span class="task-timer" style="font-size:10px; color:var(--text-muted);" data-task-id="${task.id}">${timerText}</span>
                            <svg class="task-chevron" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                            </svg>
                        </div>
                    </div>
                    <div class="task-progress-text" style="margin-top:4px; margin-bottom: 4px;">${modelLabel}</div>
                    <div class="task-prompt" title="${escapeHtml(task.prompt)}">${escapeHtml(task.prompt)}</div>
                    ${task.status === 'polling' || task.status === 'submitting' ? `
                        <div class="task-progress-bar" style="margin-top:6px;">
                            <div class="task-progress-fill" style="width: ${progress}%"></div>
                        </div>
                        <div class="task-progress-text">${progress}%</div>
                    ` : ''}
                    ${task.status === 'failed' ? `
                        <div class="task-progress-text" style="color: #ef4444; margin-top:4px;">${escapeHtml(task.error || '未知错误')}</div>
                    ` : ''}
                </div>
                <div class="task-detail" style="display: ${isOpen ? 'block' : 'none'};">
                    ${buildTaskDetailHTML(task)}
                </div>
            `;
        }

        // 构建任务详情 HTML（含调试信息）
        function buildTaskDetailHTML(task) {
            const params = task.params || {};
            const paramStr = Object.entries(params).map(([k, v]) => `${k}: ${v}`).join(', ') || '无';
            const imgCount = task.images ? task.images.length : 0;

            const debugInfo = {
                id: task.id,
                serverTaskId: task.serverTaskId,
                providerId: task.providerId,
                status: task.status,
                progress: task.progress,
                prompt: task.prompt,
                model: task.model,
                params: task.params,
                imageCount: imgCount,
                requests: task.requestHistory || [],
                error: task.error,
                pollAttempts: task.pollAttempts,
                startTime: new Date(task.startTime).toLocaleString(),
                result: task.result ? '已返回数据' : null,
                rawResponse: task.rawResponse || null
            };
            const debugJson = JSON.stringify(debugInfo, null, 2);

            return `
                <div class="task-detail-section">
                    <div class="task-detail-section-title">提示词</div>
                    <div class="task-detail-param">${escapeHtml(task.prompt)}</div>
                </div>
                <div class="task-detail-section">
                    <div class="task-detail-section-title">参数</div>
                    <div class="task-detail-param">${escapeHtml(paramStr)}</div>
                </div>
                <div class="task-detail-section">
                    <div class="task-detail-section-title">调试信息</div>
                    <div class="task-debug-content">${escapeHtml(debugJson)}</div>
                </div>
            `;
        }

        // 增量更新任务元素（只更新变化的部分，不动 DOM 结构）
        function updateTaskElement(el, task) {
            const prevStatus = el.dataset.status;
            const newStatus = task.status;

            if (prevStatus !== newStatus) {
                el.classList.remove(prevStatus);
                el.classList.add(newStatus);
                el.dataset.status = newStatus;
                if ((newStatus === 'completed' || newStatus === 'failed') && !task.endTime) {
                    task.endTime = Date.now();
                }
                saveTaskQueue().catch(() => {});
            }

            const isOpen = task.id === openTaskId;
            const wasOpen = el.classList.contains('open');

            // 展开状态变化时，更新详情显示和 open class
            if (isOpen !== wasOpen) {
                el.classList.toggle('open', isOpen);
                const detail = el.querySelector('.task-detail');
                if (detail) {
                    detail.style.display = isOpen ? 'block' : 'none';
                }
            }

            // 如果展开了，只增量更新调试信息文本，不动 DOM 结构
            if (isOpen) {
                const debugEl = el.querySelector('.task-debug-content');
                if (debugEl) {
                    const debugInfo = {
                        id: task.id,
                        serverTaskId: task.serverTaskId,
                        providerId: task.providerId,
                        status: task.status,
                        progress: task.progress,
                        prompt: task.prompt,
                        model: task.model,
                        params: task.params,
                        imageCount: task.images ? task.images.length : 0,
                        requests: task.requestHistory || [],
                        error: task.error,
                        pollAttempts: task.pollAttempts,
                        startTime: new Date(task.startTime).toLocaleString(),
                        result: task.result ? '已返回数据' : null,
                        rawResponse: task.rawResponse || null
                    };
                    const debugJson = JSON.stringify(debugInfo, null, 2);
                    debugEl.textContent = debugJson;
                }
            }

            // 更新摘要区域的动态内容
            const statusEl = el.querySelector('.task-status');
            if (statusEl) {
                const newText = TASK_STATUS_TEXT[newStatus] || newStatus;
                if (statusEl.textContent !== newText) {
                    statusEl.textContent = newText;
                    statusEl.className = `task-status ${newStatus}`;
                }
            }

            const progress = parseInt(task.progress) || 0;
            const fillEl = el.querySelector('.task-progress-fill');
            if (fillEl) {
                fillEl.style.width = progress + '%';
            }
            // 更新进度百分比文本（通过父元素结构定位）
            const barEl = el.querySelector('.task-progress-bar');
            if (barEl) {
                const percentEl = barEl.nextElementSibling;
                if (percentEl && percentEl.classList.contains('task-progress-text')) {
                    percentEl.textContent = progress + '%';
                }
            }

            // 更新计时文本
            const timerEl = el.querySelector('.task-timer');
            if (timerEl) {
                const newTimerText = buildTimerText(task);
                if (timerEl.textContent !== newTimerText) {
                    timerEl.textContent = newTimerText;
                }
            }
        }

        // 展开/收起任务详情（互斥）
        function toggleTaskDetail(taskId) {
            if (openTaskId === taskId) {
                openTaskId = null;
            } else {
                // 收起前一个
                if (openTaskId) {
                    const prevEl = document.querySelector(`.task-item[data-task-id="${openTaskId}"]`);
                    if (prevEl) {
                        prevEl.classList.remove('open');
                        const detail = prevEl.querySelector('.task-detail');
                        if (detail) detail.style.display = 'none';
                    }
                }
                openTaskId = taskId;
            }
            updateTaskUI();
        }

        // 更新任务UI（增量更新，不重建 DOM，保持滚动位置）
        function updateTaskUI(changedTask) {
            const taskContainer = document.getElementById('taskContainer');
            const taskCountEl = document.getElementById('taskCount');
            const taskFloatCountEl = document.getElementById('taskFloatCount');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('btnLoader');

            const pendingCount = taskQueue.filter(t => t.status === 'pending').length;
            const runningCount = taskQueue.filter(t => t.status === 'submitting' || t.status === 'polling').length;
            const activeTaskCount = pendingCount + runningCount;

            // 更新按钮状态
            const btnQueueCount = document.getElementById('btnQueueCount');

            if (activeTaskCount > 0) {
                btnText.textContent = `添加队列 (${activeTaskCount})`;
                loader.classList.remove('hidden');
                if (btnQueueCount) {
                    btnQueueCount.textContent = activeTaskCount;
                    btnQueueCount.classList.remove('hidden');
                }
            } else {
                btnText.textContent = '添加队列';
                loader.classList.add('hidden');
                if (btnQueueCount) {
                    btnQueueCount.classList.add('hidden');
                }
            }

            // 更新任务数量
            if (taskCountEl) {
                taskCountEl.textContent = taskQueue.length;
            }
            if (taskFloatCountEl) {
                taskFloatCountEl.textContent = activeTaskCount;
                taskFloatCountEl.style.display = activeTaskCount > 0 ? 'inline-flex' : 'none';
            }

            // 更新浏览器标签页标题
            currentBaseTitle = activeTaskCount > 0 ? `(${activeTaskCount}) ${ORIGINAL_TITLE}` : ORIGINAL_TITLE;
            if (!titleFlashInterval) {
                document.title = currentBaseTitle;
            }

            // 渲染任务列表（增量更新）
            if (taskQueue.length === 0) {
                taskContainer.innerHTML = `
                    <div class="text-center py-8 text-sm" style="color: var(--text-muted);">
                        暂无任务
                    </div>
                `;
                openTaskId = null;
                stopTaskTimer();
                return;
            }

            // 如果当前是空状态占位符，先清空
            if (taskContainer.querySelector('.text-center.py-8')) {
                taskContainer.innerHTML = '';
            }

            // 需要的任务顺序（最新的在前）
            const orderedTasks = taskQueue.slice().reverse();
            const neededIds = orderedTasks.map(t => t.id);

            // 获取现有 DOM 中的任务元素
            const existingEls = Array.from(taskContainer.querySelectorAll('.task-item'));
            const existingMap = new Map();
            existingEls.forEach(el => {
                const id = el.dataset.taskId;
                if (id) existingMap.set(id, el);
            });

            // 删除不在 neededIds 中的元素
            existingMap.forEach((el, id) => {
                if (!neededIds.includes(id)) {
                    el.remove();
                    if (openTaskId === id) openTaskId = null;
                }
            });

            // 按顺序插入/更新
            orderedTasks.forEach((task, index) => {
                let el = existingMap.get(task.id);
                if (!el) {
                    el = createTaskElement(task);
                    el.dataset.status = task.status;
                }
                updateTaskElement(el, task);

                // 确保位置正确
                const currentAtIndex = taskContainer.children[index];
                if (currentAtIndex !== el) {
                    taskContainer.insertBefore(el, currentAtIndex || null);
                }
            });

            // 状态变化消息
            if (changedTask) {
                if (changedTask.status === 'completed') {
                    showMessage(`任务 ${changedTask.id.slice(-4)} 完成`, 'success');
                    if (document.hidden) {
                        triggerSuccessNotification();
                    }
                } else if (changedTask.status === 'failed') {
                    showMessage(`任务 ${changedTask.id.slice(-4)} 失败: ${changedTask.error}`, 'error');
                }
            }
        }

        // 清理所有任务

        const TASK_SIDEBAR_WIDTH_KEY = 'grsaiNanoV2TaskSidebarWidth';
        const TASK_SIDEBAR_COLLAPSED_KEY = 'grsaiNanoV2TaskSidebarCollapsed';

        function initTaskSidebar() {
            const sidebar = document.getElementById('taskSidebar');
            const resizer = document.getElementById('taskSidebarResizer');
            if (!sidebar || !resizer) return;

            const savedWidth = parseInt(localStorage.getItem(TASK_SIDEBAR_WIDTH_KEY), 10);
            if (Number.isFinite(savedWidth)) {
                setTaskSidebarWidth(savedWidth);
            }

            const savedCollapsed = localStorage.getItem(TASK_SIDEBAR_COLLAPSED_KEY);
            if (savedCollapsed === 'false') {
                sidebar.classList.remove('collapsed');
                document.body.classList.remove('task-sidebar-collapsed');
            } else {
                sidebar.classList.add('collapsed');
                document.body.classList.add('task-sidebar-collapsed');
            }

            let startX = 0;
            let startWidth = 0;

            resizer.addEventListener('pointerdown', (e) => {
                if (sidebar.classList.contains('collapsed')) return;
                e.preventDefault();
                startX = e.clientX;
                startWidth = sidebar.getBoundingClientRect().width;
                document.body.classList.add('resizing-task-sidebar');
                resizer.setPointerCapture(e.pointerId);
            });

            resizer.addEventListener('pointermove', (e) => {
                if (!document.body.classList.contains('resizing-task-sidebar')) return;
                const nextWidth = startWidth + (startX - e.clientX);
                setTaskSidebarWidth(nextWidth);
            });

            const stopResize = (e) => {
                if (!document.body.classList.contains('resizing-task-sidebar')) return;
                document.body.classList.remove('resizing-task-sidebar');
                localStorage.setItem(TASK_SIDEBAR_WIDTH_KEY, String(Math.round(sidebar.getBoundingClientRect().width)));
                if (e.pointerId !== undefined && resizer.hasPointerCapture(e.pointerId)) {
                    resizer.releasePointerCapture(e.pointerId);
                }
            };

            resizer.addEventListener('pointerup', stopResize);
            resizer.addEventListener('pointercancel', stopResize);
        }

        function setTaskSidebarWidth(width) {
            const clampedWidth = Math.min(Math.max(width, 280), 640);
            document.documentElement.style.setProperty('--global-task-sidebar-width', `${clampedWidth}px`);
        }

        function toggleTaskSidebar() {
            const sidebar = document.getElementById('taskSidebar');
            if (!sidebar) return;
            sidebar.classList.toggle('collapsed');
            document.body.classList.toggle('task-sidebar-collapsed', sidebar.classList.contains('collapsed'));
            localStorage.setItem(TASK_SIDEBAR_COLLAPSED_KEY, String(sidebar.classList.contains('collapsed')));
        }

        function clearAllTasks() {
            if (taskQueue.length === 0) return;
            
            taskQueue.forEach(task => {
                if (task.pollTimer) {
                    clearInterval(task.pollTimer);
                }
            });
            
            taskQueue = [];
            runningTaskCount = 0;
            openTaskId = null;

            updateTaskUI();
            if (db) {
                const transaction = db.transaction([SESSION_STORE_NAME], 'readwrite');
                const store = transaction.objectStore(SESSION_STORE_NAME);
                store.delete(TASK_QUEUE_STATE_KEY);
            }
            showMessage('任务列表已清理', 'success');
        }

        // HTML转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 图像生成 - 使用任务队列
        async function generateImage() {
            const baseUrl = document.getElementById('baseUrl').value.trim();
            const apiKey = document.getElementById('apiKey').value.trim();
            const prompt = getParsedPromptText();
            const params = collectProviderSettings();

            if (!baseUrl || !apiKey) {
                showMessage('请填写 API Base URL 和 API Key', 'error');
                return;
            }
            if (!prompt) {
                showMessage('请输入提示词', 'error');
                return;
            }

            const validImages = imageFiles.filter(f => f !== null);

            hideMessage();

            // 创建新任务并加入队列
            createTask(baseUrl, apiKey, activeProvider, prompt, params, validImages);
            
            showMessage('任务已添加到队列', 'success');
            
            // 更新按钮状态
            updateTaskUI({ status: 'pending' });
        }

        function blobToBase64(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        }

        function extractImageSource(result) {
            if (!result) return null;
            // Nano Banana 格式：results 数组或顶层 url
            if (Array.isArray(result.results) && result.results.length > 0) {
                return result.results[0].url || null;
            }
            if (result.url) return result.url;
            // 兼容旧格式 / data 包裹
            const data = result.data || result;
            if (Array.isArray(data.results) && data.results.length > 0) {
                return data.results[0].url || null;
            }
            if (data.url) return data.url;
            // GPT Image / OpenAI 格式
            const resultItems = Array.isArray(data)
                ? data
                : Array.isArray(data?.data)
                    ? data.data
                    : Array.isArray(data?.data?.data)
                        ? data.data.data
                        : null;
            const firstItem = resultItems?.[0];
            if (!firstItem) return null;
            if (firstItem.url) return firstItem.url;
            if (firstItem.b64_json) return `data:image/png;base64,${firstItem.b64_json}`;
            return null;
        }

        function showMessage(msg, type) {
            const area = document.getElementById('messageArea');
            area.textContent = msg;
            area.classList.remove('hidden');
            area.style.cssText = '';

            if (type === 'error') {
                area.style.background = 'rgba(239, 68, 68, 0.2)';
                area.style.color = '#ef4444';
                area.style.border = '1px solid rgba(239, 68, 68, 0.3)';
            } else {
                area.style.background = 'rgba(34, 197, 94, 0.2)';
                area.style.color = '#22c55e';
                area.style.border = '1px solid rgba(34, 197, 94, 0.3)';
            }
        }

        function hideMessage() {
            document.getElementById('messageArea').classList.add('hidden');
        }

        // 键盘快捷键关闭模态框
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeImageModal();
                closeCropHistoryPicker();
            }
        });

        // ==================== 裁图工具 ====================
        let isCropToolOpen = false;
        let cropImage = null; // Image element
        let cropGridCols = 3;
        let cropGridRows = 3;
        let cropPieces = []; // Array of data URLs

        function toggleCropTool() {
            isCropToolOpen = !isCropToolOpen;
            setDrawerOpen('cropToolDrawer', 'cropDrawerIcon', isCropToolOpen);
            localStorage.setItem(CROP_TOOL_STATE_KEY, String(isCropToolOpen));
        }

        function ensureCropToolOpen() {
            if (!isCropToolOpen) {
                toggleCropTool();
            }
            // 滚动到裁切工具
            setTimeout(() => {
                document.getElementById('cropToolDrawer').scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 300);
        }

        function handleCropFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            loadFileIntoCropTool(file);
            event.target.value = '';
        }

        function loadFileIntoCropTool(file) {
            if (!file.type.startsWith('image/')) {
                showMessage('请选择图片文件', 'error');
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                setCropImage(e.target.result);
            };
            reader.readAsDataURL(file);
        }

        // 裁切工具拖拽和粘贴支持
        function initCropDropZone() {
            const dropZone = document.getElementById('cropDropZone');
            if (!dropZone) return;

            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.stopPropagation();
                dropZone.style.borderColor = 'var(--accent-blue)';
                dropZone.style.background = 'rgba(59, 130, 246, 0.1)';
            });

            dropZone.addEventListener('dragleave', (e) => {
                e.preventDefault();
                e.stopPropagation();
                dropZone.style.borderColor = 'var(--border-input)';
                dropZone.style.background = 'var(--slot-bg)';
            });

            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                e.stopPropagation();
                dropZone.style.borderColor = 'var(--border-input)';
                dropZone.style.background = 'var(--slot-bg)';
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    loadFileIntoCropTool(files[0]);
                }
            });

            // Ctrl+V 粘贴支持（整个裁切工具区域）
            document.addEventListener('paste', (e) => {
                // 如果焦点在富文本编辑器中则不拦截
                if (document.activeElement.id === 'prompt' || document.activeElement.isContentEditable) return;
                // 裁切工具面板必须展开
                if (!isCropToolOpen) return;

                const items = e.clipboardData.items;
                for (let item of items) {
                    if (item.type.startsWith('image/')) {
                        e.preventDefault();
                        const blob = item.getAsFile();
                        loadFileIntoCropTool(blob);
                        break;
                    }
                }
            });
        }

        // 在页面加载时初始化拖拽区
        document.addEventListener('DOMContentLoaded', initCropDropZone);

        function setCropImage(src) {
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = () => {
                cropImage = img;
                renderCropPreview();
                document.getElementById('cropPreviewArea').classList.remove('hidden');
                document.getElementById('cropResultArea').classList.add('hidden');
                cropPieces = [];
                ensureCropToolOpen();
            };
            img.onerror = () => {
                showMessage('裁切工具：图片加载失败', 'error');
            };
            img.src = src;
        }

        function applyCropGridSettings(cols, rows, save = true) {
            const normalizedCols = parseInt(cols) || 3;
            const normalizedRows = parseInt(rows) || 3;

            cropGridCols = normalizedCols;
            cropGridRows = normalizedRows;

            document.querySelectorAll('#cropGridOptions .grid-option-btn').forEach(btn => {
                const isActive = btn.getAttribute('onclick') === `setCropGrid(${normalizedCols}, ${normalizedRows})`;
                btn.classList.toggle('active', isActive);
            });

            if (cropImage) {
                renderCropPreview();
                // 如果之前已切割过，清空结果
                document.getElementById('cropResultArea').classList.add('hidden');
                cropPieces = [];
            }

            if (save) {
                saveConfig();
            }
        }

        function setCropGrid(cols, rows) {
            applyCropGridSettings(cols, rows);
        }

        function renderCropPreview() {
            if (!cropImage) return;

            const canvas = document.getElementById('cropCanvas');
            const ctx = canvas.getContext('2d');

            // 限制预览尺寸
            const maxW = 600;
            const maxH = 500;
            let w = cropImage.naturalWidth;
            let h = cropImage.naturalHeight;
            const scale = Math.min(maxW / w, maxH / h, 1);
            w = Math.round(w * scale);
            h = Math.round(h * scale);

            canvas.width = w;
            canvas.height = h;

            // 绘制图片
            ctx.drawImage(cropImage, 0, 0, w, h);

            // 绘制网格线
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.lineWidth = 2;
            ctx.setLineDash([8, 6]);

            // 垂直线
            for (let i = 1; i < cropGridCols; i++) {
                const x = Math.round(w * i / cropGridCols);
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, h);
                ctx.stroke();
            }

            // 水平线
            for (let j = 1; j < cropGridRows; j++) {
                const y = Math.round(h * j / cropGridRows);
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(w, y);
                ctx.stroke();
            }

            // 阴影描边让线条更清晰
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.4)';
            ctx.lineWidth = 1;
            ctx.setLineDash([8, 6]);
            ctx.lineDashOffset = 4;

            for (let i = 1; i < cropGridCols; i++) {
                const x = Math.round(w * i / cropGridCols);
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, h);
                ctx.stroke();
            }

            for (let j = 1; j < cropGridRows; j++) {
                const y = Math.round(h * j / cropGridRows);
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(w, y);
                ctx.stroke();
            }

            ctx.setLineDash([]);
            ctx.lineDashOffset = 0;
        }

        function executeCrop() {
            if (!cropImage) {
                showMessage('请先选择一张图片', 'error');
                return;
            }

            const w = cropImage.naturalWidth;
            const h = cropImage.naturalHeight;
            const pieceW = Math.floor(w / cropGridCols);
            const pieceH = Math.floor(h / cropGridRows);

            cropPieces = [];
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');

            for (let row = 0; row < cropGridRows; row++) {
                for (let col = 0; col < cropGridCols; col++) {
                    const sx = col * pieceW;
                    const sy = row * pieceH;
                    // 最后一列/行取到边缘
                    const sw = (col === cropGridCols - 1) ? (w - sx) : pieceW;
                    const sh = (row === cropGridRows - 1) ? (h - sy) : pieceH;

                    tempCanvas.width = sw;
                    tempCanvas.height = sh;
                    tempCtx.drawImage(cropImage, sx, sy, sw, sh, 0, 0, sw, sh);

                    cropPieces.push({
                        dataUrl: tempCanvas.toDataURL('image/png'),
                        label: `${row + 1}-${col + 1}`,
                        row, col
                    });
                }
            }

            renderCropResults();
        }

        function renderCropResults() {
            const resultArea = document.getElementById('cropResultArea');
            const grid = document.getElementById('cropResultGrid');
            resultArea.classList.remove('hidden');

            grid.style.gridTemplateColumns = `repeat(${cropGridCols}, 1fr)`;
            grid.innerHTML = cropPieces.map((piece, idx) => `
                <div class="crop-piece">
                    <img src="${piece.dataUrl}" alt="切片 ${piece.label}">
                    <span class="crop-piece-label">${piece.label}</span>
                    <div class="crop-piece-overlay">
                        <button class="crop-piece-btn" onclick="openImageModal('${piece.dataUrl}')" title="放大预览">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"/></svg>
                        </button>
                        <button class="crop-piece-btn" onclick="downloadCropPiece(${idx})" title="下载此切片">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                        </button>
                    </div>
                </div>
            `).join('');

            resultArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function downloadCropPiece(index) {
            const piece = cropPieces[index];
            if (!piece) return;
            const link = document.createElement('a');
            link.href = piece.dataUrl;
            link.download = `crop-${piece.label}-${Date.now()}.png`;
            link.click();
        }

        async function downloadAllCropPieces() {
            if (cropPieces.length === 0) {
                showMessage('没有可下载的切片', 'error');
                return;
            }

            if (typeof JSZip === 'undefined') {
                showMessage('JSZip 库尚未加载，请稍后再试', 'error');
                return;
            }

            try {
                const zip = new JSZip();
                const folder = zip.folder('crop-pieces');

                cropPieces.forEach((piece, idx) => {
                    // 从 data URL 提取 base64 数据
                    const base64Data = piece.dataUrl.split(',')[1];
                    folder.file(`crop-${piece.label}.png`, base64Data, { base64: true });
                });

                const blob = await zip.generateAsync({ type: 'blob' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `crop-${cropGridRows}x${cropGridCols}-${Date.now()}.zip`;
                link.click();
                URL.revokeObjectURL(url);

                showMessage(`已打包 ${cropPieces.length} 张切片`, 'success');
            } catch (error) {
                console.error('ZIP download failed:', error);
                showMessage('打包下载失败: ' + error.message, 'error');
            }
        }

        // 从结果图发送到裁切工具
        function sendResultToCrop() {
            const resultImage = document.getElementById('resultImage');
            if (!resultImage || !resultImage.src || resultImage.src === window.location.href) {
                showMessage('暂无结果图片可裁切', 'error');
                return;
            }
            setCropImage(resultImage.src);
        }

        // 从历史记录发送到裁切工具
        async function sendHistoryToCrop(id) {
            try {
                const history = await getAllHistory();
                const item = history.find(h => h.id === id);
                if (item && item.imageData) {
                    setCropImage(item.imageData);
                } else {
                    showMessage('未找到历史图片', 'error');
                }
            } catch (error) {
                console.error('Failed to load history image for crop:', error);
                showMessage('加载历史图片失败', 'error');
            }
        }

        // 弹窗选择历史图片
        async function openHistoryPickerForCrop() {
            try {
                const history = await getAllHistory();
                const picker = document.getElementById('cropHistoryPicker');
                const grid = document.getElementById('cropHistoryPickerGrid');

                if (history.length === 0) {
                    grid.innerHTML = '<div class="text-center py-8 text-sm" style="color: var(--text-muted); grid-column: 1 / -1;">暂无历史记录</div>';
                } else {
                    grid.innerHTML = history.map(item => `
                        <div class="crop-history-picker-item" onclick="pickHistoryForCrop('${item.imageData.substring(0, 50)}', ${item.id})">
                            <img src="${item.imageData}" alt="History" loading="lazy">
                        </div>
                    `).join('');
                }

                picker.classList.add('active');
                document.body.style.overflow = 'hidden';
            } catch (error) {
                console.error('Failed to open history picker:', error);
                showMessage('加载历史记录失败', 'error');
            }
        }

        async function pickHistoryForCrop(_, id) {
            closeCropHistoryPicker();
            await sendHistoryToCrop(id);
        }

        function closeCropHistoryPicker(event) {
            const picker = document.getElementById('cropHistoryPicker');
            picker.classList.remove('active');
            document.body.style.overflow = '';
        }
    </script>
</body>

</html>
